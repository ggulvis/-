<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>임대현황 관리</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f3f0;--surface:#fff;--surface2:#f9f8f6;--border:#e5e3de;--text:#1a1a18;--text2:#6b6b65;--text3:#9e9e96;--accent:#2563eb;--accent-light:#eff6ff;--red:#dc2626;--red-light:#fef2f2;--orange:#ea580c;--orange-light:#fff7ed;--green:#16a34a;--green-light:#f0fdf4;--shadow:0 1px 3px rgba(0,0,0,.08);--shadow-md:0 4px 6px rgba(0,0,0,.07);--shadow-lg:0 10px 15px rgba(0,0,0,.08);--radius:12px;--radius-sm:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
input,textarea,select,button{font-family:inherit;font-size:14px}
button{cursor:pointer;border:none;outline:none}
.app-nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
.nav-logo{font-size:16px;font-weight:700;letter-spacing:-.3px}
.nav-right{display:flex;align-items:center;gap:8px}
.nav-btn{padding:6px 14px;border-radius:var(--radius-sm);font-weight:500;transition:all .15s;font-size:13px}
.nav-btn-ghost{background:transparent;color:var(--text2)}.nav-btn-ghost:hover{background:var(--surface2);color:var(--text)}
.nav-btn-primary{background:var(--accent);color:#fff}
.nav-user{font-size:13px;color:var(--text2)}
.main-content{max-width:1100px;margin:0 auto;padding:24px 16px}
.center-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f4f3f0,#e8e6e0);padding:20px}
.center-card{background:var(--surface);border-radius:20px;padding:40px 36px;width:100%;max-width:420px;box-shadow:var(--shadow-lg);text-align:center}
.center-icon{font-size:40px;margin-bottom:14px}
.center-title{font-size:20px;font-weight:700;margin-bottom:6px;letter-spacing:-.5px}
.center-sub{color:var(--text2);font-size:13px;margin-bottom:24px;line-height:1.6}
.google-btn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:13px 20px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);font-weight:600;font-size:14px;color:var(--text);transition:all .15s;box-shadow:var(--shadow);cursor:pointer}
.google-btn:hover{border-color:#aaa;box-shadow:var(--shadow-md)}
.google-logo{width:20px;height:20px;flex-shrink:0}
.pending-steps{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin:20px 0;text-align:left}
.pending-step{display:flex;align-items:flex-start;gap:12px;padding:8px 0}
.pending-step:not(:last-child){border-bottom:1px solid var(--border)}
.step-num{width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.step-text{font-size:13px;color:var(--text2)}.step-text strong{color:var(--text);display:block;margin-bottom:2px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius-sm);font-weight:500;font-size:13px;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{opacity:.9}.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-secondary{background:var(--surface);border:1px solid var(--border);color:var(--text)}.btn-secondary:hover{background:var(--surface2)}
.btn-danger{background:var(--red-light);color:var(--red);border:1px solid #fecaca}.btn-danger:hover{background:#fee2e2}
.btn-success{background:var(--green-light);color:var(--green);border:1px solid #bbf7d0}.btn-success:hover{background:#dcfce7}
.btn-sm{padding:5px 10px;font-size:12px}.btn-xs{padding:3px 8px;font-size:11px}
.btn-full{width:100%;justify-content:center;padding:12px;font-size:14px}
.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.form-label{font-size:12px;font-weight:600;color:var(--text2)}
.form-input{padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);transition:border .15s;width:100%}
.form-input:focus{outline:none;border-color:var(--accent)}
.form-textarea{resize:vertical;min-height:70px}
.form-checkbox-row{display:flex;align-items:center;gap:8px;margin-top:4px}
.form-checkbox{width:16px;height:16px;cursor:pointer;accent-color:var(--accent)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.span2{grid-column:1/-1}
@media(max-width:480px){.form-grid{grid-template-columns:1fr}}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.page-title{font-size:20px;font-weight:700;letter-spacing:-.5px}
.page-subtitle{font-size:13px;color:var(--text2);margin-top:2px}
.buildings-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.building-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow);transition:box-shadow .2s}
.building-card:hover{box-shadow:var(--shadow-md)}
.building-header{padding:16px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.building-name{font-size:15px;font-weight:700;letter-spacing:-.3px}
.building-address{font-size:12px;color:var(--text3);margin-top:2px}
.building-count{font-size:11px;background:var(--surface2);border:1px solid var(--border);padding:3px 8px;border-radius:99px;color:var(--text2);white-space:nowrap;flex-shrink:0}
.lease-list{padding:10px 0}
.lease-row{padding:8px 18px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .1s}
.lease-row:hover{background:var(--surface2)}
.lease-room{font-size:12px;font-weight:600;background:var(--surface2);border:1px solid var(--border);padding:2px 7px;border-radius:5px;min-width:40px;text-align:center;flex-shrink:0}
.lease-tenant{font-size:13px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lease-date{font-size:11px;color:var(--text2)}
.badge{font-size:11px;font-weight:600;padding:2px 7px;border-radius:5px;white-space:nowrap;flex-shrink:0}
.badge-red{background:var(--red-light);color:var(--red)}
.badge-orange{background:var(--orange-light);color:var(--orange)}
.badge-green{background:var(--green-light);color:var(--green)}
.badge-gray{background:var(--surface2);color:var(--text3);border:1px solid var(--border)}
.building-footer{padding:10px 18px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.show-all-btn{background:none;border:none;font-size:12px;color:var(--accent);font-weight:500;padding:0;cursor:pointer}
.show-all-btn:hover{text-decoration:underline}
.empty-leases{padding:16px 18px;font-size:12px;color:var(--text3);text-align:center}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .15s ease}
@media(min-width:600px){.modal-overlay{align-items:center;padding:20px}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-height:92vh;overflow-y:auto;animation:slideUp .2s ease;padding-bottom:env(safe-area-inset-bottom,16px)}
@media(min-width:600px){.modal{border-radius:var(--radius);max-width:560px;max-height:90vh}}
.modal-header{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1}
.modal-title{font-size:16px;font-weight:700}
.modal-close{background:var(--surface2);border:none;width:30px;height:30px;border-radius:50%;font-size:18px;color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer}
.modal-body{padding:20px}
.form-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius)}
.detail-table{width:100%;border-collapse:collapse}
.detail-table th{text-align:left;padding:10px 14px;font-size:12px;font-weight:600;color:var(--text2);background:var(--surface2);border-bottom:1px solid var(--border);white-space:nowrap}
.detail-table td{padding:11px 14px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
.detail-table tr:last-child td{border-bottom:none}
.detail-table tr:hover td{background:var(--surface2)}
.actions-cell{display:flex;gap:6px}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:20px;overflow-x:auto}
.tab{padding:10px 18px;font-size:13px;font-weight:500;color:var(--text2);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .15s;white-space:nowrap}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.role-badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:5px}
.role-admin{background:#fef3c7;color:#92400e}
.role-editor{background:var(--accent-light);color:var(--accent)}
.role-viewer{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:#1a1a18;color:#fff;padding:11px 18px;border-radius:var(--radius);font-size:13px;font-weight:500;box-shadow:var(--shadow-lg);animation:slideUp .2s ease;white-space:nowrap}
.toast.error{background:var(--red)}.toast.success{background:var(--green)}
.section-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px}
.section-card-header{padding:14px 16px;border-bottom:1px solid var(--border);font-size:13px;font-weight:600;display:flex;justify-content:space-between;align-items:center}
.select-input{padding:7px 10px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-size:13px}
.select-input:focus{outline:none;border-color:var(--accent)}
.drop-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:32px 20px;text-align:center;cursor:pointer;transition:all .15s;background:var(--surface2)}
.drop-zone:hover,.drop-zone.dragging{border-color:var(--accent);background:var(--accent-light)}
.empty-state{text-align:center;padding:40px 20px;color:var(--text2)}
.loading-spinner{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--text2);font-size:14px;gap:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--text2);background:none;border:none;cursor:pointer;padding:0;margin-bottom:16px;font-weight:500}
.back-btn:hover{color:var(--text)}
.tag{display:inline-block;font-size:11px;padding:2px 7px;border-radius:4px;background:var(--surface2);border:1px solid var(--border);color:var(--text2)}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
// ============================================================
// ★ Supabase 설정값 입력
// ============================================================
const SUPABASE_URL = 'https://nhkbymfhmqgilbdxirpq.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5oa2J5bWZobXFnaWxiZHhpcnBxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MTQ3MDgsImV4cCI6MjA5MjI5MDcwOH0.Ob3Suz5Fi1zCkVSf3Hoiafns75nKIq0YJ7z9Uh3bt_c';
// ============================================================

const { useState, useEffect, useCallback, useRef } = React;
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function daysUntil(d){if(!d)return null;return Math.ceil((new Date(d)-new Date())/86400000);}
function formatDate(d){if(!d)return'-';const dt=new Date(d);return `${dt.getFullYear()}.${String(dt.getMonth()+1).padStart(2,'0')}.${String(dt.getDate()).padStart(2,'0')}`;}
function formatMoney(n){if(!n&&n!==0)return'-';if(n>=10000)return `${(n/10000).toLocaleString()}억`;return `${Number(n).toLocaleString()}만`;}

function ExpiryBadge({endDate}){
  const d=daysUntil(endDate);
  if(d===null)return <span className="badge badge-gray">날짜없음</span>;
  if(d<0)return <span className="badge badge-red">만료 {Math.abs(d)}일</span>;
  if(d<=30)return <span className="badge badge-red">D-{d}</span>;
  if(d<=90)return <span className="badge badge-orange">D-{d}</span>;
  return <span className="badge badge-green">D-{d}</span>;
}

function ToastContainer({toasts}){return <div className="toast-wrap">{toasts.map(t=><div key={t.id} className={`toast ${t.type||''}`}>{t.msg}</div>)}</div>;}

function Modal({title,onClose,children}){
  useEffect(()=>{const h=e=>e.key==='Escape'&&onClose();document.addEventListener('keydown',h);return()=>document.removeEventListener('keydown',h);},[onClose]);
  return(<div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}><div className="modal"><div className="modal-header"><span className="modal-title">{title}</span><button className="modal-close" onClick={onClose}>×</button></div><div className="modal-body">{children}</div></div></div>);
}

function LoginPage(){
  const[loading,setLoading]=useState(false);
  const login=async()=>{setLoading(true);await sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:window.location.origin+window.location.pathname}});};
  return(<div className="center-page"><div className="center-card"><div className="center-icon">🏢</div><div className="center-title">임대현황 관리</div><div className="center-sub">Google 계정으로 로그인하세요.<br/>처음 로그인 시 간단한 정보 입력이 필요합니다.</div><button className="google-btn" onClick={login} disabled={loading}><svg className="google-logo" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>{loading?'로그인 중...':'Google로 로그인'}</button></div></div>);
}

function RegisterPage({session,onDone}){
  const[name,setName]=useState(session.user.user_metadata?.full_name||'');
  const[phone,setPhone]=useState('');
  const[saving,setSaving]=useState(false);
  const submit=async()=>{
    if(!name.trim())return alert('이름을 입력해주세요');
    if(!phone.trim())return alert('연락처를 입력해주세요');
    setSaving(true);
    const{error}=await sb.from('user_roles').upsert({user_id:session.user.id,email:session.user.email,full_name:name.trim(),phone:phone.trim(),role:'viewer',status:'pending'},{onConflict:'email'});
    setSaving(false);
    if(error)alert('오류: '+error.message);else onDone();
  };
  return(<div className="center-page"><div className="center-card"><div className="center-icon">👋</div><div className="center-title">접근 신청</div><div className="center-sub">관리자 승인 후 서비스를 이용할 수 있습니다.</div><div style={{display:'inline-block',background:'var(--accent-light)',border:'1px solid #bfdbfe',color:'var(--accent)',padding:'5px 14px',borderRadius:'99px',fontSize:'13px',fontWeight:'500',marginBottom:20}}>{session.user.email}</div><div className="form-group" style={{textAlign:'left'}}><label className="form-label">이름 *</label><input className="form-input" value={name} onChange={e=>setName(e.target.value)} placeholder="실명 입력"/></div><div className="form-group" style={{textAlign:'left'}}><label className="form-label">연락처 *</label><input className="form-input" value={phone} onChange={e=>setPhone(e.target.value)} placeholder="010-0000-0000"/></div><button className="btn btn-primary btn-full" style={{marginTop:8}} onClick={submit} disabled={saving}>{saving?'제출 중...':'접근 신청하기'}</button></div></div>);
}

function PendingPage({userRecord,onLogout,onRefresh}){
  const[checking,setChecking]=useState(false);
  const check=async()=>{setChecking(true);await onRefresh();setChecking(false);};
  return(<div className="center-page"><div className="center-card"><div className="center-icon">⏳</div><div className="center-title">승인 대기 중</div><div className="center-sub">관리자가 접근 권한을 검토하고 있습니다.</div><div className="pending-steps"><div className="pending-step"><div className="step-num">✓</div><div className="step-text"><strong>신청 완료</strong>{userRecord?.full_name} · {userRecord?.email}</div></div><div className="pending-step"><div className="step-num" style={{background:'var(--orange)'}}>2</div><div className="step-text"><strong>관리자 승인 대기</strong>승인 후 바로 이용 가능합니다</div></div></div><div style={{display:'flex',gap:8,justifyContent:'center'}}><button className="btn btn-secondary btn-sm" onClick={check} disabled={checking}>{checking?'확인 중...':'승인 확인'}</button><button className="btn btn-secondary btn-sm" onClick={onLogout}>로그아웃</button></div></div></div>);
}

function BuildingFormModal({building,onSave,onClose}){
  const[name,setName]=useState(building?.name||'');
  const[address,setAddress]=useState(building?.address||'');
  const[saving,setSaving]=useState(false);
  const save=async()=>{
    if(!name.trim())return alert('건물명을 입력해주세요');
    setSaving(true);
    const payload={name:name.trim(),address:address.trim()};
    const{error}=building?.id?await sb.from('buildings').update(payload).eq('id',building.id):await sb.from('buildings').insert(payload);
    setSaving(false);
    if(error)alert('저장 실패: '+error.message);else onSave();
  };
  return(<Modal title={building?.id?'건물 수정':'건물 추가'} onClose={onClose}><div className="form-group"><label className="form-label">건물명</label><input className="form-input" value={name} onChange={e=>setName(e.target.value)} placeholder="예: 강남빌딩"/></div><div className="form-group"><label className="form-label">주소 (선택)</label><input className="form-input" value={address} onChange={e=>setAddress(e.target.value)}/></div><div className="form-footer"><button className="btn btn-secondary" onClick={onClose}>취소</button><button className="btn btn-primary" onClick={save} disabled={saving}>{saving?'저장 중...':'저장'}</button></div></Modal>);
}

function LeaseFormModal({lease,buildingId,buildings,customFields,onSave,onClose}){
  const[form,setForm]=useState({building_id:lease?.building_id||buildingId||'',room_number:lease?.room_number||'',tenant_name:lease?.tenant_name||'',tenant_phone:lease?.tenant_phone||'',deposit:lease?.deposit||'',monthly_rent:lease?.monthly_rent||'',start_date:lease?.start_date||'',end_date:lease?.end_date||'',insurance:lease?.insurance||false,memo:lease?.memo||'',custom_data:lease?.custom_data||{}});
  const[saving,setSaving]=useState(false);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const setCustom=(k,v)=>setForm(f=>({...f,custom_data:{...f.custom_data,[k]:v}}));
  const save=async()=>{
    if(!form.building_id)return alert('건물을 선택해주세요');
    setSaving(true);
    const payload={...form,deposit:form.deposit?Number(form.deposit):null,monthly_rent:form.monthly_rent?Number(form.monthly_rent):null,start_date:form.start_date||null,end_date:form.end_date||null};

ked)}/><label htmlFor="ins" style={{cursor:'pointer'}}>보증보험 가입</label></div></div>{customFields.map(cf=><div key={cf.field_key} className="form-group"><label className="form-label">{cf.field_label}</label>{cf.field_type==='boolean'?<div className="form-checkbox-row"><input className="form-checkbox" type="checkbox" checked={!!form.custom_data[cf.field_key]} onChange={e=>setCustom(cf.field_key,e.target.checked)}/><label>{cf.field_label}</label></div>:cf.field_type==='date'?<input className="form-input" type="date" value={form.custom_data[cf.field_key]||''} onChange={e=>setCustom(cf.field_key,e.target.value)}/>:cf.field_type==='number'?<input className="form-input" type="number" value={form.custom_data[cf.field_key]||''} onChange={e=>setCustom(cf.field_key,e.target.value)}/>:<input className="form-input" value={form.custom_data[cf.field_key]||''} onChange={e=>setCustom(cf.field_key,e.target.value)}/>}</div>)}<div className="form-group span2"><label className="form-label">특이사항 메모</label><textarea className="form-input form-textarea" value={form.memo} onChange={e=>set('memo',e.target.value)}/></div></div><div className="form-footer"><button className="btn btn-secondary" onClick={onClose}>취소</button><button className="btn btn-primary" onClick={save} disabled={saving}>{saving?'저장 중...':'저장'}</button></div></Modal>);

function ExcelImport({buildings,customFields,onDone,showToast}){
  const[preview,setPreview]=useState(null);
  const[importing,setImporting]=useState(false);
  const[dragging,setDragging]=useState(false);
  const inputRef=useRef();
  const processFile=file=>{const reader=new FileReader();reader.onload=e=>{try{const wb=XLSX.read(e.target.result,{type:'array'});const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});setPreview(rows);}catch(err){alert('파일 읽기 실패: '+err.message);}};reader.readAsArrayBuffer(file);};
  const doImport=async()=>{
    if(!preview?.length)return;
    setImporting(true);let success=0,fail=0;
    for(const row of preview){
      const bName=row['건물명']||row['건물']||'';if(!bName){fail++;continue;}
      let building=buildings.find(b=>b.name===bName);
      if(!building){const{data,error}=await sb.from('buildings').insert({name:bName}).select().single();if(error){fail++;continue;}building=data;}
      const parseDate=v=>{if(!v)return null;if(typeof v==='number')return new Date((v-25569)*86400000).toISOString().split('T')[0];return String(v).replace(/\./g,'-').slice(0,10)||null;};
      const payload={building_id:building.id,room_number:String(row['호실']||row['호수']||''),tenant_name:String(row['임차인']||row['임차인명']||row['이름']||''),tenant_phone:String(row['연락처']||row['전화번호']||''),deposit:Number(String(row['보증금']||'').replace(/[^0-9]/g,''))||null,monthly_rent:Number(String(row['월세']||'').replace(/[^0-9]/g,''))||null,start_date:parseDate(row['계약시작일']||row['시작일']),end_date:parseDate(row['만기일']||row['계약만기일']),insurance:['O','o','가입','1','true'].includes(String(row['보증보험']||'')),memo:String(row['메모']||row['특이사항']||''),custom_data:{}};
      customFields.forEach(cf=>{if(row[cf.field_label]!==undefined)payload.custom_data[cf.field_key]=row[cf.field_label];});
      const{error}=await sb.from('leases').insert(payload);if(error)fail++;else success++;
    }
    setImporting(false);showToast(`${success}건 가져오기 완료${fail?`, ${fail}건 실패`:''}`,success>0?'success':'error');setPreview(null);onDone();
  };
  return(<div><p style={{fontSize:13,color:'var(--text2)',marginBottom:16}}>열 이름: <strong>건물명, 호실, 임차인명, 연락처, 보증금, 월세, 계약시작일, 만기일, 보증보험, 메모</strong></p><div className={`drop-zone ${dragging?'dragging':''}`} onClick={()=>inputRef.current.click()} onDragOver={e=>{e.preventDefault();setDragging(true);}} onDragLeave={()=>setDragging(false)} onDrop={e=>{e.preventDefault();setDragging(false);if(e.dataTransfer.files[0])processFile(e.dataTransfer.files[0]);}}><div style={{fontSize:28,marginBottom:8}}>📊</div><div style={{fontSize:13,color:'var(--text2)'}}><strong style={{color:'var(--accent)'}}>클릭 또는 드래그</strong><br/>.xlsx .xls .csv</div></div><input ref={inputRef} type="file" accept=".xlsx,.xls,.csv" style={{display:'none'}} onChange={e=>{if(e.target.files[0])processFile(e.target.files[0]);}}/>{preview&&<div><div style={{margin:'14px 0 8px',fontWeight:600,fontSize:13}}>{preview.length}개 항목 미리보기</div><div className="table-wrap" style={{maxHeight:220,overflow:'auto'}}><table className="detail-table"><thead><tr>{Object.keys(preview[0]).map(k=><th key={k}>{k}</th>)}</tr></thead><tbody>{preview.slice(0,5).map((r,i)=><tr key={i}>{Object.values(r).map((v,j)=><td key={j}>{String(v)}</td>)}</tr>)}</tbody></table></div><div className="form-footer" style={{borderTop:'none',marginTop:12}}><button className="btn btn-secondary" onClick={()=>setPreview(null)}>취소</button><button className="btn btn-primary" onClick={doImport} disabled={importing}>{importing?'가져오는 중...':'가져오기'}</button></div></div>}</div>);
}

function FieldManager({fields,onRefresh,showToast}){
  const[label,setLabel]=useState('');const[type,setType]=useState('text');const[adding,setAdding]=useState(false);
  const addField=async()=>{if(!label.trim())return;setAdding(true);const key='cf_'+Date.now().toString(36);const{error}=await sb.from('custom_fields').insert({field_key:key,field_label:label.trim(),field_type:type,sort_order:fields.length});setAdding(false);if(error)showToast('추가 실패','error');else{showToast('항목 추가됨','success');setLabel('');onRefresh();}};
  const deleteField=async(id,lbl)=>{if(!confirm(`"${lbl}" 항목을 삭제하면 모든 임대의 해당 데이터도 사라집니다. 계속할까요?`))return;const{error}=await sb.from('custom_fields').delete().eq('id',id);if(error)showToast('삭제 실패','error');else{showToast('항목 삭제됨');onRefresh();}};

}

iv>);

function App(){
  const[session,setSession]=useState(null);
  const[loading,setLoading]=useState(true);
  const[userRecord,setUserRecord]=useState(undefined);
  const[buildings,setBuildings]=useState([]);
  const[leases,setLeases]=useState([]);
  const[customFields,setCustomFields]=useState([]);
  const[users,setUsers]=useState([]);
  const[page,setPage]=useState('dashboard');
  const[selectedBuilding,setSelectedBuilding]=useState(null);
  const[modal,setModal]=useState(null);
  const[toasts,setToasts]=useState([]);

  const showToast=useCallback((msg,type='')=>{const id=Date.now();setToasts(t=>[...t,{id,msg,type}]);setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3000);},[]);

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{setSession(session);if(!session)setLoading(false);});
    const{data:{subscription}}=sb.auth.onAuthStateChange((_,s)=>{setSession(s);if(!s){setLoading(false);setUserRecord(undefined);}});
    return()=>subscription.unsubscribe();
  },[]);

  useEffect(()=>{if(session)loadUserRecord();},[session]);

  const loadUserRecord=async()=>{
    setLoading(true);
    const{data}=await sb.from('user_roles').select('*').eq('user_id',session.user.id).single();
    if(!data){
      const{data:byEmail}=await sb.from('user_roles').select('*').eq('email',session.user.email).single();
      if(byEmail){await sb.from('user_roles').update({user_id:session.user.id}).eq('id',byEmail.id);setUserRecord({...byEmail,user_id:session.user.id});}
      else setUserRecord(null);
    }else setUserRecord(data);
    setLoading(false);
  };

  const loadData=useCallback(async()=>{
    const[b,l,cf,u]=await Promise.all([sb.from('buildings').select('*').order('name'),sb.from('leases').select('*'),sb.from('custom_fields').select('*').order('sort_order'),sb.from('user_roles').select('*').order('created_at')]);
    if(b.data)setBuildings(b.data);if(l.data)setLeases(l.data);if(cf.data)setCustomFields(cf.data);if(u.data)setUsers(u.data);
  },[]);

  useEffect(()=>{if(userRecord?.status==='active')loadData();},[userRecord]);

  const refresh=()=>{loadUserRecord();loadData();};
  const logout=()=>sb.auth.signOut();

  const deleteBuilding=async id=>{if(!confirm('건물을 삭제하면 해당 임대 정보도 모두 삭제됩니다.'))return;const{error}=await sb.from('buildings').delete().eq('id',id);if(error)showToast('삭제 실패','error');else{showToast('건물 삭제됨');if(selectedBuilding?.id===id){setPage('dashboard');setSelectedBuilding(null);}loadData();}};
  const deleteLease=async id=>{if(!confirm('임대 정보를 삭제하시겠습니까?'))return;const{error}=await sb.from('leases').delete().eq('id',id);if(error)showToast('삭제 실패','error');else{showToast('삭제됨');loadData();}};

  if(loading)return <div className="loading-spinner"><div className="spinner"/><span>로딩 중...</span></div>;
  if(!session)return <LoginPage/>;
  if(userRecord===null)return <RegisterPage session={session} onDone={loadUserRecord}/>;
  if(userRecord?.status==='pending')return <PendingPage userRecord={userRecord} onLogout={logout} onRefresh={loadUserRecord}/>;

  const userRole=userRecord?.role;
  const pendingCount=users.filter(u=>u.status==='pending').length;
  const buildingLeases=selectedBuilding?leases.filter(l=>l.building_id===selectedBuilding.id):[];

  return(<div><nav className="app-nav"><div className="nav-logo">🏢 임대현황</div><div className="nav-right"><span className="nav-user">{userRecord?.full_name||session.user.email}</span>{page!=='dashboard'&&<button className="nav-btn nav-btn-ghost" onClick={()=>{setPage('dashboard');setSelectedBuilding(null);}}>대시보드</button>}{userRole==='admin'&&<button className={`nav-btn ${page==='admin'?'nav-btn-primary':'nav-btn-ghost'}`} onClick={()=>setPage('admin')}>⚙️ 관리{pendingCount>0?` (${pendingCount})`:''}</button>}<button className="nav-btn nav-btn-ghost" onClick={logout}>로그아웃</button></div></nav><div className="main-content">{page==='dashboard'&&<Dashboard buildings={buildings} leases={leases} customFields={customFields} userRole={userRole} onBuildingClick={b=>{setSelectedBuilding(b);setPage('detail');}} onAddBuilding={()=>setModal({type:'building_form'})} onEditBuilding={b=>setModal({type:'building_form',data:b})} onDeleteBuilding={deleteBuilding} onAddLease={b=>setModal({type:'lease_form',buildingId:b.id})}/>}{page==='detail'&&selectedBuilding&&<BuildingDetailPage building={selectedBuilding} leases={buildingLeases} customFields={customFields} userRole={userRole} onBack={()=>{setPage('dashboard');setSelectedBuilding(null);}} onEdit={()=>setModal({type:'building_form',data:selectedBuilding})} onDelete={()=>deleteBuilding(selectedBuilding.id)} onAddLease={()=>setModal({type:'lease_form',buildingId:selectedBuilding.id})} onEditLease={l=>setModal({type:'lease_form',data:l})} onDeleteLease={deleteLease}/>}{page==='admin'&&<AdminPage users={users} currentUserId={session.user.id} customFields={customFields} buildings={buildings} onRefresh={refresh} showToast={showToast}/>}</div>{modal?.type==='lease_form'&&<LeaseFormModal lease={modal.data} buildingId={modal.buildingId} buildings={buildings} customFields={customFields} onSave={()=>{showToast('저장 완료','success');setModal(null);loadData();}} onClose={()=>setModal(null)}/>}{modal?.type==='building_form'&&<BuildingFormModal building={modal.data} onSave={()=>{showToast('저장 완료','success');setModal(null);loadData();}} onClose={()=>setModal(null)}/>}<ToastContainer toasts={toasts}/></div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
