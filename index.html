function dday(end) {
  if (!end) return null;
  const t = new Date(); t.setHours(0, 0, 0, 0);
  const e = new Date(end + "T00:00:00");
  if (isNaN(e)) return null;
  return Math.round((e - t) / 86400000);
}
function ddayInfo(end) {
  const d = dday(end);
  if (d === null) return { label: "-", cls: "bg-slate-200 text-slate-600" };
  if (d < 0) return { label: "만료 " + Math.abs(d) + "일", cls: "bg-red-600 text-white" };
  if (d === 0) return { label: "D-DAY", cls: "bg-red-600 text-white" };
  if (d <= 30) return { label: "D-" + d, cls: "bg-red-100 text-red-700 border border-red-300" };
  if (d <= 90) return { label: "D-" + d, cls: "bg-amber-100 text-amber-700 border border-amber-300" };
  return { label: "D-" + d, cls: "bg-emerald-100 text-emerald-700 border border-emerald-300" };
}
function fmtMoney(v) {
  if (v === null || v === undefined || v === "") return "-";
  const n = Number(v);
  if (isNaN(n)) return String(v);
  if (n >= 10000) {
    const eok = Math.floor(n / 10000), man = n % 10000;
    return man ? `${eok}억 ${man.toLocaleString()}` : `${eok}억`;
  }
  return n.toLocaleString();
}
function fmtKRW(v) {
  if (v === null || v === undefined || v === "") return "-";
  const n = Number(v);
  if (isNaN(n)) return String(v);
  if (n >= 10000) {

    return man ? `${eok}억 ${man.toLocaleString()}만원` : `${eok}억`;
  }

}
function fmtDate(d) { return d || "-"; }

function telHref(p) { return "tel:" + String(p).replace(/[^0-9+]/g, ""); }
function fmtIns(v) { return v === true ? "가입" : v === false ? "미가입" : "-"; }

  return null;
}
function normDate(v) {
  if (v === null || v === undefined || v === "") return null;
  if (v instanceof Date && !isNaN(v)) {
    const y = v.getFullYear(), m = String(v.getMonth() + 1).padStart(2, "0"), dd = String(v.getDate()).padStart(2, "0");
    return `${y}-${m}-${dd}`;
  }
  if (typeof v === "number") { // 엑셀 시리얼 날짜
    const d = new Date(Math.round((v - 25569) * 86400000));
    return normDate(d);
  }
  const s = String(v).trim().replace(/[./]/g, "-").replace(/-+$/, "");
  const m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if (m) return `${m[1]}-${m[2].padStart(2, "0")}-${m[3].padStart(2, "0")}`;
  return null;
}
function numOrNull(v) {
  if (v === null || v === undefined || v === "") return null;
  const n = Number(String(v).replace(/[,\s원만]/g, ""));
  return isNaN(n) ? null : n;
}
let inactiveBuildingIds = new Set(); // 관리중단(active=false) 건물 id — 모든 정렬에서 항상 후순위(맨 뒤)
function leaseSort(a, b) {
  // 관리중단 건물은 모든 정렬에서 항상 맨 뒤(후순위)로
  const ai = inactiveBuildingIds.has(a.building_id), bi = inactiveBuildingIds.has(b.building_id);
  if (ai !== bi) return ai ? 1 : -1;
  // 공실을 최상단, 계약완료는 맨 뒤, 그 외에는 만기 임박순
  const av = !!a.vacant && !a.contract_done, bv = !!b.vacant && !b.contract_done;
  if (av !== bv) return av ? -1 : 1;
  if (!!a.contract_done !== !!b.contract_done) return a.contract_done ? 1 : -1;
  if (!a.end_date && !b.end_date) return 0;
  if (!a.end_date) return 1;
  if (!b.end_date) return -1;
  return a.end_date < b.end_date ? -1 : a.end_date > b.end_date ? 1 : 0;
}
// 만기일에 n년 더하기 (연장 빠른 설정용). 기준일 없으면 오늘부터
function addYears(dateStr, n) {
  const base = dateStr && /^\d{4}-\d{2}-\d{2}/.test(dateStr) ? new Date(dateStr + "T00:00:00") : new Date();
  base.setFullYear(base.getFullYear() + n);
  const y = base.getFullYear(), m = String(base.getMonth() + 1).padStart(2, "0"), d = String(base.getDate()).padStart(2, "0");
  return `${y}-${m}-${d}`;
}

/* 중복 검출

/* 계약서 OCR 텍스트에서 정보 추출 (보조용 — 승인 시 사람이 확인) */
function parseMoneyToMan(s) {
  s = String(s || "").replace(/\s/g, "");
  let man = 0, matched = false;
  const eok = s.match(/([0-9,]+)억/);
  if (eok) { man += parseInt(eok[1].replace(/,/g, ""), 10) * 10000; matched = true; s = s.split("억")[1] || ""; }
  const manM = s.match(/([0-9,]+)만/);
  if (manM) { man += parseInt(manM[1].replace(/,/g, ""), 10); matched = true; }
  if (!matched) {
    const n = parseInt(s.replace(/[^0-9]/g, ""), 10);
    if (!n) return null;
    man = n >= 1000000 ? Math.round(n / 10000) : n; // 원 단위 큰 숫자는 만원 환산
  }
  return man || null;
}
function parseContractText(t) {
  const out = {};
  const dates = [...t.matchAll(/(20\d{2})\s*[년.\-\/]\s*(\d{1,2})\s*[월.\-\/]\s*(\d{1,2})/g)]
    .map((m) => `${m[1]}-${String(+m[2]).padStart(2, "0")}-${String(+m[3]).padStart(2, "0")}`);
  const uniq = [...new Set(dates)].sort();
  if (uniq.length >= 2) { out.start_date = uniq[0]; out.end_date = uniq[uniq.length - 1]; }
  else if (uniq.length === 1) { out.end_date = uniq[0]; }
  const money = (kw) => {
    const m = t.match(new RegExp(kw + "[^0-9억]{0,15}([0-9,억\\s]+(?:만)?)"));
    return m ? parseMoneyToMan(m[1]) : null;
  };
  out.deposit = money("보증금");
  out.rent = money("월세") ?? money("차임");
  out.management_fee = money("관리비");
  const ph = t.match(/01[016789][-.\s]?\d{3,4}[-.\s]?\d{4}/);
  if (ph) out.tenant_phone = ph[0].replace(/[.\s]/g, "-");
  return out;
}

function fileToB64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(String(r.result).split(",")[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}
async function downscaleImage(file, maxDim) {
  try {
    const bmp = await createImageBitmap(file);
    const scale = Math.min(1, maxDim / Math.max(bmp.width, bmp.height));
    if (scale >= 1 && file.size < 3500000) return file;
    const w = Math.round(bmp.width * scale), h = Math.round(bmp.height * scale);
    const c = document.createElement("canvas");
    c.width = w; c.height = h;
    c.getContext("2d").drawImage(bmp, 0, 0, w, h);
    const blob = await new Promise((res) => c.toBlob(res, "image/jpeg", 0.85));
    return blob || file;
  } catch (e) { return file; }
}

function exactKey(l) {
  return [l.building_id, (l.room_number || "").trim(), (l.tenant_name || "").trim(), l.start_date || "", l.end_date || ""].join("|");
}
function findDupGroups(leases) {
  const exact = {}, amount = {};
  leases.forEach((l) => {
    const ek = exactKey(l);
    (exact[ek] = exact[ek] || []).push(l);
    const sk = [l.building_id, (l.room_number || "").trim(), l.deposit ?? "", l.monthly_rent ?? ""].join("|");
    (amount[sk] = amount[sk] || []).push(l);
  });
  const exactGroups = Object.values(exact).filter((g) => g.length > 1);
  const suspectGroups = Object.values(amount).filter((g) => {
    if (g.length < 2) return false;
    return new Set(g.map(exactKey)).size > 1; // 전부 동일하면 완전 중복 쪽에서 처리
  });
  return { exactGroups, suspectGroups };
}

/* 보증보험 가입완료/가입중 매물 옆에 붙는 체크 배지 (둘 다 동일 표시) */
function InsMark() {

}
/* 가입완료(insurance) 또는 가입중(insurance_pending)이면 true */
const isInsured = (l) => !!l && (l.insurance === true || l.insurance_pending === true);
/* 복비 보너스/덤이 붙은 매물이면 true (태그 기준: 복비·보너스·덤 포함) */
const hasBonus = (l) => !!l && Array.isArray(l.tags) && l.tags.some((t) => /복비|보너스|덤/.test(String(t)));
/* 서울 주택 임대차 법정 중개보수 상한(만원). deposit·rent 만원 단위. 산정 불가 시 null.
   거래금액=보증금+월세×100(단 5천만 미만이면 ×70). 요율/한도: <5천만 0.5%·20만 / <1억 0.4%·30만 / <6억 0.3% / <12억 0.4% / <15억 0.5% / 이상 0.6% */
function legalMaxFee(deposit, rent) {
  const dep = Number(deposit) || 0, rt = Number(rent) || 0;
  if (dep <= 0 && rt <= 0) return null;
  const base = dep + rt * 100;
  const amt = base < 5000 ? dep + rt * 70 : base; // 거래금액(만원)
  let rate, cap;
  if (amt < 5000) { rate = 0.005; cap = 20; }
  else if (amt < 10000) { rate = 0.004; cap = 30; }
  else if (amt < 60000) { rate = 0.003; cap = Infinity; }
  else if (amt < 120000) { rate = 0.004; cap = Infinity; }
  else if (amt < 150000) { rate = 0.005; cap = Infinity; }
  else { rate = 0.006; cap = Infinity; }
  return Math.min(amt * rate, cap); // 만원
}
const BONUS_TAGS = ["임대인 복비보너스", "임차인 복비보너스", "복비보너스"];

function TagChips({ items, tone }) {

/* 태그 선택기 (수정 모달용). allowCustom=true면 "직접입력"으로 자유 태그 추가 가능 */
function TagPicker({ options, selected, onToggle, tone, allowCustom }) {
  const [custom, setCustom] = useState("");
  const sel = selected || [];
  const activeCls = tone === "building" ? "bg-violet-600 border-violet-600 text-white" : "bg-amber-500 border-amber-500 text-white";
  const knownVals = options.map((o) => o.v);
  const customTags = sel.filter((v) => !knownVals.includes(v));
  const addCustom = () => {
    const t = custom.trim();
    if (!t) return;
    if (!sel.includes(t)) onToggle(t);
    setCustom("");
  };
  return (
    <div>
      <div className="flex flex-wrap gap-1.5">
        {options.map((o) => {
          const on = sel.includes(o.v);
          return (
            <button type="button" key={o.v} onClick={() => onToggle(o.v)}
              className={"text-xs font-semibold border rounded-full px-3 py-1.5 " + (on ? activeCls : "bg-white text-slate-600 border-slate-300 hover:bg-slate-50")}>
              {on ? "✓ " : ""}{o.d}
            </button>
          );
        })}
        {customTags.map((t) => (
          <button type="button" key={t} onClick={() => onToggle(t)} title="눌러서 제거"
            className={"text-xs font-semibold border rounded-full px-3 py-1.5 " + activeCls}>
            {t} ✕
          </button>
        ))}
      </div>
      {allowCustom && (
        <div className="flex gap-1.5 mt-2">
          <input className={inputCls + " !py-1.5 text-sm"} value={custom} onChange={(e) => setCustom(e.target.value)}
            onKeyDown={(e) => { if (e.key === "Enter") { e.preventDefault(); addCustom(); } }}
            placeholder="직접입력 (예: 복비 30만원)" />
          <button type="button" onClick={addCustom} className="shrink-0 text-xs font-semibold bg-slate-700 hover:bg-slate-800 text-white rounded-lg px-3">추가</button>
        </div>
      )}
    </div>
  );
}

/* ---------------- 건물 추가/수정 모달 ---------------- */
function BuildingModal({ building, onClose, onSaved }) {
  const isNew = !building.id;
  const [name, setName] = useState(building.name || "");
  const [address, setAddress] = useState(building.address || "");
  const [entrance, setEntrance] = useState(building.entrance_code || "");
  const [managerPhone, setManagerPhone] = useState(building.manager_phone || "");
  const [bMemo, setBMemo] = useState(building.memo || "");
  const [options, setOptions] = useState(Array.isArray(building.options) ? building.options : []);
  const [active, setActive] = useState(building.active !== false);
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const toggleOpt = (v) => setOptions((prev) => prev.includes(v) ? prev.filter((x) => x !== v) : [...prev, v]);
  const save = async () => {
    if (!name.trim()) { setErr("건물명을 입력하세요."); return; }
    setBusy(true); setErr("");
    const payload = { name: name.trim(), address: address.trim() || null, entrance_code: entrance.trim() || null, manager_phone: managerPhone.trim() || null, memo: bMemo.trim() || null, options, active };
    const q = isNew ? sb.from("buildings").insert(payload) : sb.from("buildings").update(payload).eq("id", building.id);
    const { error } = await q;
    setBusy(false);
    if (error) setErr("저장 실패: " + error.message); else { onSaved(); onClose(); }
  };
  const remove = async () => {
    if (!confirm("건물을 삭제하면 소속된 모든 임대 정보도 함께 삭제됩니다. 계속할까요?")) return;
    setBusy(true);
    const { error } = await sb.from("buildings").delete().eq("id", building.id);
    setBusy(false);
    if (error) setErr("삭제 실패: " + error.message); else { onSaved(); onClose(); }
  };
  return (
    <Modal title={isNew ? "건물 추가" : "건물 수정"} onClose={onClose}>
      <Field label="건물명"><input className={inputCls} value={name} onChange={(e) => setName(e.target.value)} placeholder="예: 보담빌딩" /></Field>
      <Field label="주소"><input className={inputCls} value={address} onChange={(e) => setAddress(e.target.value)} placeholder="예: 서울 마포구 ..." /></Field>
      <Field label="공동현관 비밀번호"><input className={inputCls} value={entrance} onChange={(e) => setEntrance(e.target.value)} placeholder="예: #1234" /></Field>
      <Field label="관리인 연락처 (건물 담당자 전화번호)"><input className={inputCls} value={managerPhone} onChange={(e) => setManagerPhone(e.target.value)} inputMode="tel" placeholder="예: 010-1234-5678" /></Field>
      <Field label="건물 메모 (주차·계약규칙·입금계좌 등)"><textarea className={inputCls + " min-h-[70px]"} value={bMemo} onChange={(e) => setBMemo(e.target.value)} placeholder="예: 주차 1대 가능 · 보증금은 신협 계좌로 입금" /></Field>
      <div className="mb-3">
        <p className="text-sm font-semibold text-slate-600 mb-1.5">건물 옵션</p>
        <TagPicker options={BUILDING_OPTS} selected={options} onToggle={toggleOpt} tone="building" />
      </div>
      <label className={"flex items-start gap-2.5 border rounded-xl p-3 mb-3 cursor-pointer " + (active ? "bg-white" : "bg-red-50 border-red-300")}>
        <input type="checkbox" className="w-5 h-5 accent-blue-600 mt-0.5 shrink-0" checked={active} onChange={(e) => setActive(e.target.checked)} />
        <span className="text-sm">
          <b className={active ? "text-slate-800" : "text-red-700"}>{active ? "관리 중인 건물" : "관리 중단됨"}</b>
          <span className="block text-xs text-slate-500 mt-0.5">체크를 해제하면 관리계약 해지(관리 중단) 상태가 되어, 열람자·편집자에게는 이 건물과 소속 매물이 보이지 않습니다. 관리인·관리자는 계속 볼 수 있습니다.</span>
        </span>
      </label>
      {err && <p className="text-sm text-red-600 mb-3">{err}</p>}
      <div className="flex gap-2 pb-2">
        <button className={btnPrimary + " flex-1"} onClick={save} disabled={busy}>저장</button>
        {!isNew && <button className={btnDanger} onClick={remove} disabled={busy}>삭제</button>}
        <button className={btnGhost} onClick={onClose}>취소</button>
      </div>
    </Modal>
  );
}

/* ---------------- 프로필 모달 ---------------- */
function ProfileModal({ profile, leases, buildings, onClose, onSaved, onCancelDone }) {
  const [tab, setTab] = useState("contracts"); // 기본 탭: 내가 한 계약 (profile | contracts)
  const [aff, setAff] = useState(profile.affiliation || "");
  const [name, setName] = useState(profile.full_name || "");
  const [phone, setPhone] = useState(profile.phone || "");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const [openId, setOpenId] = useState(null);
  const bName = (id) => (buildings || []).find((b) => b.id === id)?.name || "-";
  const myName = profile.full_name || profile.email;
  const cutoff = Date.now() - 92 * 86400000; // 최근 약 3개월
  const myContracts = (leases || [])
    .filter((l) => l.contract_done && l.contract_done_by === myName && l.contract_done_at && new Date(l.contract_done_at).getTime() >= cutoff)
    .sort((a, b) => String(b.contract_done_at).localeCompare(String(a.contract_done_at)));
  const save = async () => {
    if (!name.trim() || !phone.trim()) { setErr("이름과 연락처를 입력하세요."); return; }
    setBusy(true); setErr("");
    const { error } = await sb.from("user_roles").update({ affiliation: aff.trim() || null, full_name: name.trim(), phone: phone.trim() }).eq("id", profile.id);
    setBusy(false);
    if (error) setErr("저장 실패: " + error.message); else { onSaved(); onClose(); }
  };
  const withdraw = async () => {
    if (!confirm("정말 탈퇴하시겠어요?\n\n내 계정 정보와 권한이 삭제되고 로그아웃됩니다.\n다시 이용하려면 재가입 후 관리자 승인이 필요합니다.\n(구글 계정 자체에는 영향이 없습니다.)")) return;
    setBusy(true); setErr("");
    const { error } = await sb.from("user_roles").delete().eq("id", profile.id);
    if (error) { setBusy(false); setErr("탈퇴 실패: " + error.message); return; }
    await sb.auth.signOut();
    window.location.reload();
  };
  const tabBtn = (id, label, badge) => (
    <button onClick={() => setTab(id)}
      className={"px-3.5 py-2 rounded-lg text-sm font-semibold whitespace-nowrap " + (tab === id ? "bg-blue-600 text-white" : "bg-slate-100 text-slate-600 hover:bg-slate-200")}>
      {label}{badge > 0 && <span className={"ml-1.5 text-xs " + (tab === id ? "text-blue-100" : "text-slate-400")}>{badge}</span>}
    </button>
  );
  return (
    <Modal title="내 프로필" onClose={onClose} wide>
      <div className="flex gap-2 mb-4">
        {tabBtn("contracts", "내가 한 계약", myContracts.length)}
        {tabBtn("profile", "프로필")}
      </div>

      {tab === "contracts" && (
        <div className="pb-2">
          <p className="text-xs text-slate-400 mb-2">최근 3개월 이내에 내가 계약완료한 매물입니다. 계약이 파기되면 아래에서 바로 처리할 수 있습니다.</p>
          {myContracts.length === 0 ? (
            <p className="text-sm text-slate-400 text-center py-10">최근 3개월 내 계약완료 내역이 없습니다.</p>
          ) : (
            <div className="space-y-2">
              {myContracts.map((l) => {
                const b = (buildings || []).find((x) => x.id === l.building_id) || {};
                const open = openId === l.id;
                return (
                  <div key={l.id} className="border rounded-xl bg-white overflow-hidden">
                    <button className="w-full text-left px-3.5 py-2.5 flex items-center justify-between gap-2 active:bg-slate-50"
                      onClick={() => setOpenId(open ? null : l.id)}>
                      <span className="min-w-0">
                        <b className="text-slate-800">{bName(l.building_id)} {fmtRoom(l.room_number)}</b>
                        {l.tenant_name && <span className="text-slate-500 text-sm ml-1.5">{l.tenant_name}</span>}
                      </span>
                      <span className="text-xs text-emerald-600 font-semibold shrink-0">🎉 {String(l.contract_done_at).slice(0, 10)}</span>
                    </button>
                    {open && (
                      <div className="px-3.5 pb-3 border-t bg-slate-50/60">
                        <div className="text-sm text-slate-600 space-y-0.5 py-2">
                          {b.address && <p><span className="text-slate-400">주소</span> {b.address}</p>}
                          <p><span className="text-slate-400">입주~만기</span> {fmtDate(l.start_date)} ~ {fmtDate(l.end_date)}</p>
                          {l.deposit != null && <p><span className="text-slate-400">보증금</span> {fmtKRW(l.deposit)} {l.monthly_rent != null && <span className="ml-2"><span className="text-slate-400">월세</span> {fmtKRW(l.monthly_rent)}</span>}</p>}
                          {l.tenant_phone && <p><span className="text-slate-400">연락처</span> <a className="text-blue-600 font-medium" href={telHref(l.tenant_phone)}>📞 세 {l.tenant_phone}</a></p>}
                        </div>
                        <button className="w-full bg-red-50 border border-red-300 text-red-600 font-bold rounded-lg py-2.5 active:bg-red-100"
                          onClick={() => onCancelDone(l)}>계약 파기 (계약완료 취소)</button>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      <div className={tab === "profile" ? "" : "hidden"}>
      <div className="mb-4 text-sm text-slate-500">
        <p>{profile.email}</p>
        <p className="mt-1">권한: <RoleBadge role={profile.role} /></p>
      </div>
      <Field label="소속 (회사/팀)"><input className={inputCls} value={aff} onChange={(e) => setAff(e.target.value)} placeholder="예: 보담공인중개사" /></Field>
      <Field label={"이름 (예: 홍길동)"}><input className={inputCls} value={name} onChange={(e) => setName(e.target.value)} placeholder="홍길동" /></Field>
      <Field label="연락처"><input className={inputCls} value={phone} onChange={(e) => setPhone(e.target.value)} inputMode="tel" /></Field>
      {err && <p className="text-sm text-red-600 mb-3">{err}</p>}
      <div className="flex gap-2 pb-2">
        <button className={btnPrimary + " flex-1"} onClick={save} disabled={busy}>저장</button>
        <button className={btnGhost} onClick={onClose}>취소</button>
      </div>
      <div className="mt-6 pt-4 border-t">
        <button className="w-full text-sm text-red-500 hover:text-red-700 font-semibold py-2.5 rounded-lg border border-red-200 hover:bg-red-50 disabled:opacity-50" onClick={withdraw} disabled={busy}>탈퇴 (계정 삭제)</button>
        <p className="text-xs text-slate-400 text-center mt-1.5 break-keep">탈퇴하면 내 계정 정보·권한이 삭제되고 로그아웃됩니다. 다시 이용하려면 재가입 후 관리자 승인이 필요합니다.</p>
      </div>
      </div>
    </Modal>
  );
}

          <span>{fmtDate(l.start_date)} ~ {fmtDate(l.end_date)}</span>

function DuplicateModal({ leases, buildings, onClose, onSaved }) {

  const bName = (id) => (buildings.find((b) => b.id === id) || {}).name || "-";
  const { exactGroups, suspectGroups } = useMemo(() => findDupGroups(leases), [leases]);

    setBusy(true);
    const { error } = await sb.from("leases").delete().eq("id", l.id);
    setBusy(false);
    if (error) setMsg("삭제 실패: " + error.message); else onSaved();
  };
  const autoClean = async () => {
    const extras = exactGroups.flatMap((g) =>
      [...g].sort((a, b) => String(a.created_at).localeCompare(String(b.created_at))).slice(1)
    );
    if (extras.length === 0) return;
    if (!confirm(`완전 중복 ${extras.length}건을 삭제합니다 (각 그룹에서 가장 먼저 등록된 1건만 유지). 계속할까요?`)) return;
    setBusy(true);
    const { error } = await sb.from("leases").delete().in("id", extras.map((l) => l.id));
    setBusy(false);
    if (error) setMsg("정리 실패: " + error.message);
    else { setMsg(`완전 중복 ${extras.length}건을 정리했습니다.`); onSaved(); }
  };

  return (
    <Modal title="중복 데이터 관리" onClose={onClose} wide>
      <p className="text-sm text-slate-500 mb-4 leading-relaxed break-keep">
        같은 호수라도 보증금·월세 금액이 다르면(전세/월세 병행 등) 중복으로 판단하지 않습니다.
        삭제 전 등록일을 확인하세요 — 보통 가장 먼저 등록된 것이 원본입니다.
      </p>
      {msg && <p className="text-sm mb-3 text-blue-700 bg-blue-50 border border-blue-200 rounded-lg px-3 py-2">{msg}</p>}

      <div className="mb-5">
        <div className="flex items-center justify-between mb-2">
          <h4 className="font-bold text-slate-800">완전 중복 <span className="text-red-600">{exactGroups.length}그룹</span></h4>
          {exactGroups.length > 0 && <button className={btnDanger + " !py-1.5"} disabled={busy} onClick={autoClean}>자동 정리 (원본만 유지)</button>}
        </div>
        <p className="text-xs text-slate-400 mb-2">건물·호수·임차인·입주일·만기일이 전부 동일 — 엑셀 재업로드 등으로 생긴 사본입니다.</p>
        {exactGroups.length === 0 && <p className="text-sm text-slate-400 bg-slate-50 rounded-lg px-3 py-2.5">완전 중복 없음 ✓</p>}
        {exactGroups.map((g, i) => (
          <div key={i} className="border border-red-200 bg-red-50/40 rounded-xl px-3 py-1.5 mb-2">
            {g.map((l) => <DupRow key={l.id} l={l} bName={bName} onDelete={del} busy={busy} />)}
          </div>
        ))}
      </div>

      <div className="pb-2">
        <h4 className="font-bold text-slate-800 mb-2">중복 의심 <span className="text-amber-600">{suspectGroups.length}그룹</span></h4>
        <p className="text-xs text-slate-400 mb-2">건물·호수·보증금·월세는 같지만 임차인이나 날짜가 다름 — 갱신 계약일 수도 있으니 직접 확인 후 삭제하세요.</p>
        {suspectGroups.length === 0 && <p className="text-sm text-slate-400 bg-slate-50 rounded-lg px-3 py-2.5">의심 항목 없음 ✓</p>}
        {suspectGroups.map((g, i) => (
          <div key={i} className="border border-amber-200 bg-amber-50/40 rounded-xl px-3 py-1.5 mb-2">
            {g.map((l) => <DupRow key={l.id} l={l} bName={bName} onDelete={del} busy={busy} />)}
          </div>
        ))}
      </div>
    </Modal>
  );
}

/* ---------------- 계약서 사진 업로드 (OCR 자동 추출) ---------------- */
function ContractUploadModal({ lease, buildings, me, onClose, onSaved }) {
  const b = buildings.find((x) => x.id === lease.building_id) || {};
  const [file, setFile] = useState(null);
  const [preview, setPreview] = useState(null);
  const [ocrState, setOcrState] = useState("");   // "", "진행중 xx%", "완료", "실패"
  const [extracted, setExtracted] = useState({});
  const [note, setNote] = useState("");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const fileRef = useRef(null);

  const handleFile = async (f2) => {
    if (!f2) return;
    const small = await downscaleImage(f2, 1600);
    setFile(small);
    setPreview(URL.createObjectURL(small));
    setExtracted({});
    setOcrState("🤖 AI 스캔 중... (Claude)");
    try {
      const b64 = await fileToB64(small);
      const { data, error } = await sb.functions.invoke("parse-contract", { body: { image: b64, mime: "image/jpeg" } });
      if (error) throw new Error(error.message || "함수 호출 실패");
      if (data && data.error) throw new Error(data.error);
      const ex = (data && data.extracted) || {};
      const parsed = {};
      ["tenant_name", "tenant_phone", "start_date", "end_date"].forEach((k) => { if (ex[k]) parsed[k] = String(ex[k]); });
      ["deposit", "rent", "management_fee"].forEach((k) => { const n = Number(ex[k]); if (ex[k] != null && !isNaN(n)) parsed[k] = n; });
      setExtracted(parsed);
      setOcrState(Object.keys(parsed).length ? "🤖 AI 스캔 완료 — 추출 결과는 승인 시 수정 가능합니다" : "AI 스캔 완료 — 인식된 항목이 없습니다 (승인자가 직접 입력)");
    } catch (e2) {
      setOcrState("AI 스캔 실패(" + e2.message + ") — 예비 스캔 시도 중...");
      try {
        const result = await Tesseract.recognize(small, "kor+eng", {
          logger: (m) => { if (m.status === "recognizing text") setOcrState(`예비 스캔 중... ${Math.round(m.progress * 100)}%`); },
        });
        const parsed = parseContractText(result.data.text || "");
        setExtracted(parsed);
        setOcrState("예비 스캔 완료 (정확도 낮음) — 승인 시 반드시 확인하세요");
      } catch (e3) {
        setOcrState("자동 스캔 실패 — 사진만 제출됩니다 (승인자가 직접 입력)");
      }
    }
  };

  const submit = async () => {
    if (!file) { setErr("계약서 사진을 선택해주세요."); return; }
    setBusy(true); setErr("");
    try {
      const path = `${lease.id}/${Date.now()}.jpg`;
      const { error: upErr } = await sb.storage.from("contracts").upload(path, file);
      if (upErr) throw upErr;
      const { error } = await sb.from("contract_submissions").insert({
        lease_id: lease.id, file_path: path, extracted, note: note.trim() || null,
        submitted_by: (me && (me.full_name || me.email)) || null, submitted_user: me.user_id,
      });
      if (error) throw error;
      alert("제출 완료! 편집자가 승인하면 매물 정보에 반영됩니다.");
      onSaved(); onClose();
    } catch (e2) { setErr("제출 실패: " + e2.message); }
    finally { setBusy(false); }
  };

  const exRow = (k, label, isMoney) => extracted[k] == null ? null : (
    <div key={k} className="flex justify-between text-sm py-1 border-b border-slate-100 last:border-0">
      <span className="text-slate-400">{label}</span>
      <span className="font-semibold text-slate-800">{isMoney ? fmtKRW(extracted[k]) : extracted[k]}</span>
    </div>
  );

  return (
    <Modal title={`📄 계약서 업로드 — ${b.name || ""} ${lease.room_number || ""}`} onClose={onClose}>
      <p className="text-sm text-slate-500 mb-3 break-keep">계약서를 사진으로 찍어 올리면 날짜·금액을 자동 인식합니다. <b>편집자가 승인해야</b> 매물 정보에 반영됩니다.</p>
      <input ref={fileRef} type="file" accept="image/*" capture="environment" className="hidden" onChange={(e) => handleFile(e.target.files[0])} />
      <button className={btnGhost + " w-full py-3 mb-3"} onClick={() => fileRef.current.click()}>
        {file ? "📷 다른 사진 선택" : "📷 사진 촬영 / 선택"}
      </button>
      {preview && <img src={preview} className="w-full rounded-xl border mb-2 max-h-72 object-contain bg-slate-50" />}
      {ocrState && <p className="text-xs text-blue-600 font-medium mb-2">{ocrState}</p>}
      {Object.keys(extracted).length > 0 && (
        <div className="bg-slate-50 rounded-xl px-3 py-2 mb-3">
          {exRow("tenant_name", "임차인(추정)")}
          {exRow("start_date", "입주날짜(추정)")}
          {exRow("end_date", "만기일(추정)")}
          {exRow("deposit", "보증금(추정)", true)}
          {exRow("rent", "월세(추정)", true)}
          {exRow("management_fee", "관리비(추정)", true)}
          {exRow("tenant_phone", "연락처(추정)")}
        </div>
      )}
      <Field label="메모 (선택)"><input className={inputCls} value={note} onChange={(e) => setNote(e.target.value)} placeholder="승인자에게 전달할 내용" /></Field>
      {err && <p className="text-sm text-red-600 mb-2">{err}</p>}
      <div className="flex gap-2 pb-2">
        <button className={btnPrimary + " flex-1 py-3"} onClick={submit} disabled={busy || !file}>{busy ? "제출 중..." : "제출 (승인 요청)"}</button>
        <button className={btnGhost} onClick={onClose}>취소</button>
      </div>
    </Modal>
  );
}

/* ---------------- 계약서 승인 (편집자 이상) ---------------- */
function SubmissionReviewModal({ submissions, leases, buildings, me, onClose, onSaved }) {
  const pend = submissions.filter((s) => s.status === "pending");
  const [sel, setSel] = useState(null); // 선택된 submission
  const [imgUrl, setImgUrl] = useState(null);
  const [f, setF] = useState({});
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const bName = (id) => (buildings.find((x) => x.id === id) || {}).name || "";
  const leaseOf = (s) => leases.find((l) => l.id === s.lease_id);

  const open = async (s) => {
    setSel(s); setErr(""); setImgUrl(null);
    const ex = s.extracted || {};
    setF({
      tenant_name: ex.tenant_name || "", tenant_phone: ex.tenant_phone || "",
      start_date: ex.start_date || "", end_date: ex.end_date || "",
      deposit: ex.deposit ?? "", rent: ex.rent ?? "", management_fee: ex.management_fee ?? "",
    });
    const { data } = await sb.storage.from("contracts").createSignedUrl(s.file_path, 3600);
    if (data) setImgUrl(data.signedUrl);
  };
  const set = (k, v) => setF((p) => ({ ...p, [k]: v }));

  const approve = async () => {
    const l = leaseOf(sel);
    if (!l) { setErr("연결된 매물을 찾을 수 없습니다."); return; }
    setBusy(true); setErr("");
    try {
      const payload = {};
      if (f.tenant_name.trim()) payload.tenant_name = f.tenant_name.trim();
      if (f.tenant_phone.trim()) payload.tenant_phone = f.tenant_phone.trim();
      if (f.start_date) payload.start_date = f.start_date;
      if (f.end_date) payload.end_date = f.end_date;
      if (f.deposit !== "") payload.deposit = numOrNull(f.deposit);
      if (f.rent !== "") payload.monthly_rent = numOrNull(f.rent);
      if (f.management_fee !== "") payload.management_fee = numOrNull(f.management_fee);
      if (Object.keys(payload).length) {
        const { error } = await sb.from("leases").update(payload).eq("id", l.id);
        if (error) throw error;
      }
      const { error: e2 } = await sb.from("contract_submissions").update({
        status: "approved", reviewed_by: me.full_name || me.email, reviewed_at: new Date().toISOString(),
      }).eq("id", sel.id);
      if (e2) throw e2;
      setSel(null); onSaved();
    } catch (e3) { setErr("승인 실패: " + e3.message); }
    finally { setBusy(false); }
  };
  const reject = async () => {
    if (!confirm("이 계약서 제출을 거절할까요? 매물 정보는 변경되지 않습니다.")) return;
    setBusy(true);
    await sb.from("contract_submissions").update({
      status: "rejected", reviewed_by: me.full_name || me.email, reviewed_at: new Date().toISOString(),
    }).eq("id", sel.id);
    setBusy(false); setSel(null); onSaved();
  };

  return (
    <Modal title="📄 계약서 승인" onClose={onClose} wide>
      {!sel ? (
        <div className="space-y-2 pb-2">
          {pend.length === 0 && <p className="text-sm text-slate-400 text-center py-8">승인 대기 중인 계약서가 없습니다.</p>}
          {pend.map((s) => {
            const l = leaseOf(s);
            return (
              <button key={s.id} onClick={() => open(s)}
                className="w-full text-left border rounded-xl px-3 py-3 bg-white hover:bg-blue-50 flex items-center justify-between gap-2">
                <span className="min-w-0">
                  <b className="text-slate-800">{l ? `${bName(l.building_id)} ${l.room_number}` : "(매물 삭제됨)"}</b>
                  <span className="text-sm text-slate-500 ml-2">{s.submitted_by} 제출</span>
                  {s.note && <span className="block text-xs text-slate-400 truncate">메모: {s.note}</span>}
                </span>
                <span className="text-xs text-slate-400 shrink-0">{String(s.created_at).slice(0, 10)}</span>
              </button>
            );
          })}
        </div>
      ) : (
        <div className="pb-2">
          <button className="text-sm text-slate-400 mb-2" onClick={() => setSel(null)}>← 목록으로</button>
          <p className="font-bold text-slate-800 mb-2">{(() => { const l = leaseOf(sel); return l ? `${bName(l.building_id)} ${l.room_number}` : ""; })()} <span className="font-medium text-sm text-slate-500">— {sel.submitted_by} 제출</span></p>
          {imgUrl ? <img src={imgUrl} className="w-full rounded-xl border mb-3 max-h-96 object-contain bg-slate-50" /> : <p className="text-sm text-slate-400 mb-3">사진 불러오는 중...</p>}
          <p className="text-xs text-amber-600 font-semibold mb-2">⚠️ 자동 인식 값입니다. 사진과 대조해 수정한 뒤 승인하세요. 빈 칸은 기존 값을 유지합니다.</p>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-x-4">
            <Field label="임차인명"><input className={inputCls} value={f.tenant_name} onChange={(e) => set("tenant_name", e.target.value)} /></Field>
            <Field label="연락처"><input className={inputCls} value={f.tenant_phone} onChange={(e) => set("tenant_phone", e.target.value)} inputMode="tel" /></Field>
            <Field label="입주날짜"><input type="date" className={inputCls} value={f.start_date} onChange={(e) => set("start_date", e.target.value)} /></Field>
            <Field label="만기일"><input type="date" className={inputCls} value={f.end_date} onChange={(e) => set("end_date", e.target.value)} /></Field>
            <Field label="보증금 (만원)"><input className={inputCls} value={f.deposit} onChange={(e) => set("deposit", e.target.value)} inputMode="numeric" /></Field>
            <Field label="월세 (만원)"><input className={inputCls} value={f.rent} onChange={(e) => set("rent", e.target.value)} inputMode="numeric" /></Field>
            <Field label="관리비 (만원)"><input className={inputCls} value={f.management_fee} onChange={(e) => set("management_fee", e.target.value)} inputMode="numeric" /></Field>
          </div>
          {sel.note && <p className="text-sm text-slate-500 mb-2">제출자 메모: {sel.note}</p>}
          {err && <p className="text-sm text-red-600 mb-2">{err}</p>}
          <div className="flex gap-2 pt-1">
            <button className={btnPrimary + " flex-1 py-3"} onClick={approve} disabled={busy}>{busy ? "처리 중..." : "✅ 승인 (매물에 반영)"}</button>
            <button className={btnDanger} onClick={reject} disabled={busy}>거절</button>
          </div>
        </div>
      )}
    </Modal>
  );
}

/* ---------------- 이벤트 개설/수정 ---------------- */
function EventModal({ event, leases, buildings, me, onClose, onSaved }) {
  const isNew = !event.id;
  const [title, setTitle] = useState(event.title || "");
  const [desc, setDesc] = useState(event.description || "");
  const [q, setQ] = useState("");
  const [sel, setSel] = useState(() => new Set(leases.filter((l) => event.id && l.event_id === event.id).map((l) => l.id)));
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const bName = (id) => (buildings.find((b) => b.id === id) || {}).name || "";
  const qq = q.trim().toLowerCase();
  const filtered = leases.filter((l) => {
    if (!qq) return true;
    return bName(l.building_id).toLowerCase().includes(qq) ||
      (l.room_number || "").toLowerCase().includes(qq) ||
      (l.tenant_name || "").toLowerCase().includes(qq);
  });
  const toggle = (id) => setSel((p) => { const n = new Set(p); if (n.has(id)) n.delete(id); else n.add(id); return n; });
  const selectFiltered = () => setSel((p) => { const n = new Set(p); filtered.forEach((l) => n.add(l.id)); return n; });
  const clearFiltered = () => setSel((p) => { const n = new Set(p); filtered.forEach((l) => n.delete(l.id)); return n; });

  const save = async () => {
    if (!title.trim()) { setErr("이벤트 제목을 입력하세요."); return; }
    if (sel.size === 0 && !confirm("선택된 매물이 없습니다. 그래도 저장할까요?")) return;
    setBusy(true); setErr("");
    try {
      let evId = event.id;
      if (isNew) {
        const { data, error } = await sb.from("events").insert({
          title: title.trim(), description: desc.trim() || null,
          created_by: (me && (me.full_name || me.email)) || null,
        }).select().single();
        if (error) throw error;
        evId = data.id;
      } else {
        const { error } = await sb.from("events").update({ title: title.trim(), description: desc.trim() || null }).eq("id", event.id);
        if (error) throw error;
      }
      const prev = new Set(leases.filter((l) => l.event_id === evId).map((l) => l.id));
      const toAdd = [...sel].filter((id) => !prev.has(id));
      const toRemove = [...prev].filter((id) => !sel.has(id));
      if (toAdd.length) { const { error } = await sb.from("leases").update({ event_id: evId }).in("id", toAdd); if (error) throw error; }
      if (toRemove.length) { const { error } = await sb.from("leases").update({ event_id: null }).in("id", toRemove); if (error) throw error; }
      onSaved(); onClose();
    } catch (e2) { setErr("저장 실패: " + e2.message); }
    finally { setBusy(false); }
  };
  const remove = async () => {
    if (!confirm(`"${event.title}" 이벤트를 삭제할까요? 매물의 이벤트 태그도 함께 해제됩니다.`)) return;
    setBusy(true);
    const { error } = await sb.from("events").delete().eq("id", event.id);
    setBusy(false);
    if (error) setErr("삭제 실패: " + error.message); else { onSaved(); onClose(); }
  };

  return (
    <Modal title={isNew ? "🎁 새 이벤트 개설" : "이벤트 수정"} onClose={onClose} wide>
      <Field label="이벤트 제목 *"><input className={inputCls} value={title} onChange={(e) => setTitle(e.target.value)} placeholder="예: 7월 중개수수료 지원 이벤트" /></Field>
      <Field label="이벤트 내용"><textarea className={inputCls} rows="3" value={desc} onChange={(e) => setDesc(e.target.value)} placeholder="조건, 기간, 혜택 등을 적어주세요" /></Field>
      <div className="border-t pt-3">
        <div className="flex items-center gap-3 mb-2 flex-wrap">
          <p className="text-sm font-semibold text-slate-600">대상 매물 선택 <span className="text-rose-600">{sel.size}건</span></p>
          <div className="flex-1" />
          <button className="text-xs text-blue-600 font-semibold" onClick={selectFiltered}>검색결과 전체선택</button>
          <button className="text-xs text-slate-400 font-semibold" onClick={clearFiltered}>선택해제</button>
        </div>
        <input className={inputCls + " mb-2"} placeholder="건물명 · 호수 · 임차인으로 검색해서 추리세요" value={q} onChange={(e) => setQ(e.target.value)} />
        <div className="border rounded-xl max-h-64 overflow-y-auto divide-y">
          {filtered.length === 0 && <p className="text-sm text-slate-400 text-center py-6">검색 결과가 없습니다.</p>}
          {filtered.map((l) => (
            <label key={l.id} className="flex items-center gap-2.5 px-3 py-2 cursor-pointer hover:bg-slate-50">
              <input type="checkbox" className="w-4 h-4 accent-rose-500 shrink-0" checked={sel.has(l.id)} onChange={() => toggle(l.id)} />
              <span className="text-sm min-w-0 truncate">
                <b className="text-slate-800">{bName(l.building_id)} {l.room_number}</b>
                {l.tenant_name && <span className="text-slate-500 ml-1.5">{l.tenant_name}</span>}
                <span className="text-slate-400 ml-1.5">만기 {fmtDate(l.end_date)}</span>
              </span>
              {l.event_id && l.event_id !== event.id && <span className="ml-auto text-[10px] shrink-0 text-amber-600 font-semibold">다른 이벤트 적용중</span>}
            </label>
          ))}
        </div>
      </div>
      {err && <p className="text-sm text-red-600 mt-3">{err}</p>}
      <div className="flex gap-2 pt-3 pb-2">
        <button className={btnPrimary + " flex-1 py-3"} onClick={save} disabled={busy}>{busy ? "저장 중..." : "저장"}</button>
        {!isNew && <button className={btnDanger} onClick={remove} disabled={busy}>삭제</button>}
        <button className={btnGhost} onClick={onClose}>취소</button>
      </div>
    </Modal>
  );
}

/* ---------------- 꽝 없는 룰렛 이벤트 ---------------- */
const ROULETTE_START = "2026-07-17";
const ROULETTE_END = "2026-09-28";
const ROULETTE_PRIZES = [150, 50, 50, 30, 30, 30, 10, 10, 10, 10, 10, 10]; // 만원 · 총 400
const ROULETTE_COLORS = { 150: "#f59e0b", 50: "#f43f5e", 30: "#0ea5e9", 10: "#10b981" };

function rouletteToday() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}

function RoulettePractice() {
  const [stage, setStage] = useState("idle"); // idle | ask | pick | wheel | done
  const [count, setCount] = useState(0);
  const [lie, setLie] = useState(false);
  const [picked, setPicked] = useState([]);
  const [prizes, setPrizes] = useState([]);
  const [consumed, setConsumed] = useState([]);
  const [turn, setTurn] = useState(0);
  const [banner, setBanner] = useState("");
  const [bannerHot, setBannerHot] = useState(false);
  const [running, setRunning] = useState(false);
  const [paused, setPaused] = useState(false);
  const [total, setTotal] = useState(0);
  const [myResults, setMyResults] = useState([]);
  const wheelRef = useRef(null);
  const rotRef = useRef(0);
  const pausedRef = useRef(false);
  const stopRef = useRef(false);
  const genRef = useRef(0);
  const audioRef = useRef(null);

  const ac = () => {
    if (!audioRef.current) {
      const C = window.AudioContext || window.webkitAudioContext;
      if (C) try { audioRef.current = new C(); } catch (e) {}
    }
    if (audioRef.current && audioRef.current.state === "suspended") try { audioRef.current.resume(); } catch (e) {}
    return audioRef.current;
  };
  const beep = (freq, dur, type, vol, delay) => {
    const ctx = ac(); if (!ctx) return;
    try {
      const t = ctx.currentTime + (delay || 0);
      const o = ctx.createOscillator(); const g = ctx.createGain();
      o.type = type || "square"; o.frequency.value = freq;
      g.gain.setValueAtTime(vol || 0.05, t);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.connect(g); g.connect(ctx.destination);
      o.start(t); o.stop(t + dur);
    } catch (e) {}
  };
  const tickSound = () => beep(1250, 0.04, "square", 0.035);
  const thud = () => beep(200, 0.16, "sine", 0.09);
  const fanfare = () => [523, 659, 784, 1047].forEach((f, i) => beep(f, 0.2, "triangle", 0.08, i * 0.12));

  const hardReset = (next) => {
    genRef.current++;
    stopRef.current = true; pausedRef.current = false;
    setRunning(false); setPaused(false); setCount(0); setLie(false); setPicked([]);
    setPrizes([]); setConsumed([]); setTurn(0); setBanner(""); setBannerHot(false);
    setTotal(0); setMyResults([]);
    rotRef.current = 0;
    setStage(next);
  };

  // 일시정지를 반영하는 대기
  const wait = (ms) => new Promise((res) => {
    let left = ms; let last = performance.now();
    const step = (now) => {
      if (stopRef.current) return res();
      if (!pausedRef.current) left -= now - last;
      last = now;
      if (left <= 0) return res();
      requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  });

  // seg(0~11) 칸이 상단 포인터에 오도록 감속 회전
  const spinTo = (seg, duration, extraTurns) => new Promise((res) => {
    const startRot = ((rotRef.current % 360) + 360) % 360;
    const targetMod = (360 - (seg * 30 + 15) + 360) % 360;
    const jitter = Math.random() * 20 - 10; // 칸(30°) 안에서만 흔들림
    const final = startRot + 360 * extraTurns + ((targetMod - startRot + 360) % 360) + jitter;
    let elapsed = 0; let last = performance.now();
    let lastTick = Math.floor(startRot / 30);
    const ease = (x) => 1 - Math.pow(1 - x, 3);
    const frame = (now) => {
      if (stopRef.current) return res();
      if (!pausedRef.current) elapsed += now - last;
      last = now;
      const p = Math.min(1, elapsed / duration);
      const rot = startRot + (final - startRot) * ease(p);
      rotRef.current = rot;
      if (wheelRef.current) wheelRef.current.style.transform = "rotate(" + rot + "deg)";
      const ti = Math.floor(rot / 30);
      if (ti !== lastTick) { lastTick = ti; tickSound(); }
      if (p >= 1) return res();
      requestAnimationFrame(frame);
    };
    requestAnimationFrame(frame);
  });

  const startWheel = () => {
    const arr = [...ROULETTE_PRIZES];
    for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); const t = arr[i]; arr[i] = arr[j]; arr[j] = t; }
    setPrizes(arr); setConsumed([]); setTotal(0); setMyResults([]); setTurn(0);
    setBanner("👇 룰렛을 터치하세요!"); setBannerHot(false);
    rotRef.current = 0;
    setStage("wheel");
  };

  const runAll = async () => {
    if (running) return;
    ac(); // 사용자 제스처 시점에 오디오 활성화
    const g = genRef.current;
    stopRef.current = false; pausedRef.current = false;
    setPaused(false); setRunning(true);
    const used = [];
    let sum = 0;
    for (let t = 1; t <= 12; t++) {
      if (stopRef.current || genRef.current !== g) break;
      setTurn(t);
      const mine = picked.includes(t);
      setBannerHot(mine);
      setBanner(mine ? "🔥 당신의 순서입니다!" : t + "번째 참가자 순서...");
      await wait(mine ? 1200 : 500);
      if (stopRef.current || genRef.current !== g) break;
      const remaining = ROULETTE_PRIZES.map((_, i) => i).filter((i) => used.indexOf(i) < 0);
      const seg = remaining[Math.floor(Math.random() * remaining.length)];
      await spinTo(seg, mine ? 7000 : 2600, mine ? 8 : 3);
      if (stopRef.current || genRef.current !== g) break;
      used.push(seg);
      setConsumed(used.slice());
      const prize = prizes[seg];
      if (mine) {
        sum += prize; setTotal(sum);
        setMyResults((r) => [...r, { turn: t, prize }]);
        fanfare();
        setBanner("🎊 " + prize + "만원 당첨!");
      } else {
        thud();
        setBanner(t + "번째 참가자: " + prize + "만원");
      }
      await wait(mine ? 1800 : 1000);
    }
    if (genRef.current !== g) return;
    setRunning(false);
    setStage("done");
  };

  const pt = (ang, r) => [r * Math.cos(ang * Math.PI / 180), r * Math.sin(ang * Math.PI / 180)];
  const nums = Array.from({ length: 12 }, (_, i) => i + 1);

  return (
    <div className="mt-4 border-t border-amber-100 pt-3">
      {stage === "idle" && (
        <button onClick={() => hardReset("ask")}
          className="w-full rounded-xl border-2 border-dashed border-amber-300 bg-amber-50 hover:bg-amber-100 active:bg-amber-100 py-3 font-bold text-amber-700">
          🎰 룰렛 연습하기
        </button>
      )}
      {stage !== "idle" && (
        <p className="text-[11px] text-slate-400 mb-2">🎮 연습 게임 — 실제 추첨과 무관해요. 상금 구성만 동일!</p>
      )}

      {stage === "ask" && (
        <div className="text-center">
          <p className="font-bold text-slate-700 mb-2">당신은 몇 개의 방을 계약했나요?</p>
          {lie && <p className="text-sm font-bold text-rose-600 mb-2 animate-bounce">뻥치지마… 진정하고 다시 써! 🤥</p>}
          <div className="grid grid-cols-6 gap-1.5 max-w-xs mx-auto">
            {nums.map((n) => (
              <button key={n}
                onClick={() => { if (n >= 10) { setLie(true); } else { setLie(false); setCount(n); setPicked([]); setStage("pick"); } }}
                className="rounded-lg border border-slate-300 bg-white py-2 text-sm font-bold text-slate-700 hover:bg-amber-50 active:scale-95">{n}</button>
            ))}
          </div>
          <button className="text-xs text-slate-400 mt-3 underline" onClick={() => hardReset("idle")}>닫기</button>
        </div>
      )}

      {stage === "pick" && (
        <div className="text-center">
          <p className="font-bold text-slate-700 mb-1">몇 번째로 룰렛을 돌리실 건가요?</p>
          <p className="text-sm text-slate-500 mb-2">남은횟수 : <b className="text-rose-600">{count - picked.length}</b></p>
          <div className="grid grid-cols-6 gap-1.5 max-w-xs mx-auto">
            {nums.map((n) => {
              const on = picked.indexOf(n) >= 0;
              return (
                <button key={n}
                  onClick={() => setPicked(on ? picked.filter((x) => x !== n) : picked.length < count ? [...picked, n] : picked)}
                  className={"rounded-lg border py-2 text-sm font-bold active:scale-95 " +
                    (on ? "border-rose-400 bg-rose-500 text-white" : "border-slate-300 bg-white text-slate-700 hover:bg-amber-50")}>{n}</button>
              );
            })}
          </div>
          <button className={btnPrimary + " mt-3 w-full max-w-xs"} disabled={picked.length !== count} onClick={startWheel}>
            {picked.length === count ? "이 순서로 도전! 🎰" : "순서를 " + (count - picked.length) + "개 더 선택하세요"}
          </button>
        </div>
      )}

      {stage === "wheel" && (
        <div className="text-center select-none">
          <p className={"font-bold mb-2 " + (bannerHot ? "text-rose-600 text-lg" : "text-slate-700")}>{banner}</p>
          <div className="relative w-64 h-64 sm:w-72 sm:h-72 mx-auto cursor-pointer" onClick={() => { if (!running) runAll(); }}>
            <div className="absolute -top-1.5 left-1/2 -translate-x-1/2 z-10 text-2xl drop-shadow">🔻</div>
            <svg viewBox="-100 -100 200 200" className="w-full h-full">
              <g ref={wheelRef} style={{ transformOrigin: "0px 0px" }}>
                {prizes.map((p, i) => {
                  const a0 = -90 + i * 30, a1 = a0 + 30, mid = a0 + 15;
                  const s = pt(a0, 96), e = pt(a1, 96), l = pt(mid, 62);
                  const used = consumed.indexOf(i) >= 0;
                  return (
                    <g key={i}>
                      <path d={"M0 0 L" + s[0] + " " + s[1] + " A96 96 0 0 1 " + e[0] + " " + e[1] + " Z"}
                        fill={used ? "#e2e8f0" : ROULETTE_COLORS[p]} stroke="#fff" strokeWidth="1.5" />
                      <text x={l[0]} y={l[1]} fill={used ? "#94a3b8" : "#fff"} fontSize="11" fontWeight="bold"
                        textAnchor="middle" dominantBaseline="middle"
                        transform={"rotate(" + (mid + 90) + " " + l[0] + " " + l[1] + ")"}>{p}만</text>
                    </g>
                  );
                })}
              </g>
              <circle r="24" fill="#fff" stroke="#f59e0b" strokeWidth="3" />
              <text y="1" textAnchor="middle" dominantBaseline="middle" fontSize="12" fontWeight="bold" fill="#b45309">
                {running ? turn + " / 12" : "터치!"}
              </text>
            </svg>
          </div>
          <p className="mt-2 text-xs text-slate-500">내 순서: {picked.slice().sort((a, b) => a - b).join(", ")}번째</p>
          <p className="text-lg font-extrabold text-amber-600">누적 상금: {total}만원</p>
          {running && (
            <div className="flex gap-2 justify-center mt-2">
              <button className={btnGhost} onClick={() => { const nv = !pausedRef.current; pausedRef.current = nv; setPaused(nv); }}>
                {paused ? "▶ 계속" : "⏸ 일시정지"}
              </button>
              <button className={btnDanger} onClick={() => { pausedRef.current = false; setPaused(false); stopRef.current = true; }}>그만하기</button>
            </div>
          )}
        </div>
      )}

      {stage === "done" && (
        <div className="text-center">
          <div className="text-3xl mb-1">🎊</div>
          <p className="font-bold text-slate-800">연습 결과</p>
          <p className="text-2xl font-extrabold text-amber-600 my-1">{total}만원</p>
          {myResults.length > 0 ? (
            <p className="text-sm text-slate-500 mb-3">{myResults.map((r) => r.turn + "번째 → " + r.prize + "만원").join(" · ")}</p>
          ) : (
            <p className="text-sm text-slate-400 mb-3">돌린 룰렛이 없어요.</p>
          )}
          <div className="flex gap-2 justify-center pb-1">
            <button className={btnPrimary} onClick={() => hardReset("ask")}>다시하기</button>
            <button className={btnGhost} onClick={() => hardReset("idle")}>닫기</button>
          </div>
        </div>
      )}
    </div>
  );
}

function RouletteEventCard({ slots, leases, me, onChanged }) {
  const [claim, setClaim] = useState(null);
  const [name, setName] = useState("");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  if (!slots || slots.length === 0) return null; // 테이블 미생성 시 숨김

  // 칸의 실제 계약완료 상태: 이벤트에서 처리(slot) 또는 원본 매물에서 처리(lease) 모두 반영
  const effOf = (s) => {
    if (s.done_by) return { by: s.done_by, at: s.done_at, viaSlot: true };
    const l = s.lease_id ? (leases || []).find((x) => x.id === s.lease_id) : null;
    if (l && l.contract_done) return { by: l.contract_done_by || "계약완료", at: l.contract_done_at, viaSlot: false };
    return null;
  };
  const leaseOf = (s) => (s.lease_id ? (leases || []).find((x) => x.id === s.lease_id) : null);

  const today = rouletteToday();
  const doneCount = slots.filter((s) => effOf(s)).length;
  const allDone = doneCount === slots.length;
  const notStarted = today < ROULETTE_START;
  const expired = today > ROULETTE_END;
  const active = !notStarted && !expired && !allDone;
  const isMgr = ["manager", "admin"].includes(me.role);

  const openSlot = (s) => {
    const eff = effOf(s);
    if (!eff && !active) return;
    setErr("");
    if (!eff) setName(me.full_name || me.email || "");
    setClaim({ ...s, _eff: eff });
  };
  const doClaim = async () => {
    if (!name.trim()) { setErr("이름을 입력하세요."); return; }
    setBusy(true);
    const { data, error } = await sb.from("roulette_slots")
      .update({ done_by: name.trim(), done_at: new Date().toISOString(), done_by_user: me.user_id })
      .eq("idx", claim.idx).is("done_by", null).select();
    if (error) { setBusy(false); setErr(error.message); return; }
    if (!data || data.length === 0) { setBusy(false); setErr("이미 다른 분이 계약완료 처리했어요."); await onChanged(); return; }
    // 원본 매물도 계약완료 처리 → 축하 코너·실적 자동 반영 (실패해도 칸 처리는 유지)
    let warn = "";
    const l = leaseOf(claim);
    if (claim.lease_id && !(l && l.contract_done)) {
      const { error: e2 } = await sb.rpc("set_contract_done", { p_lease: claim.lease_id, p_done: true });
      if (e2) warn = "칸은 처리됐지만 원본 매물 계약완료 연동에 실패했습니다: " + e2.message + "\n매물 상세에서 직접 계약완료 처리해주세요.";
    }
    setBusy(false);
    setClaim(null);
    await onChanged();
    if (warn) alert(warn);
  };
  const undoClaim = async () => {
    if (!confirm(claim.building + " " + claim.room + " 계약완료(" + (claim._eff && claim._eff.by) + ")를 취소할까요?\n원본 매물의 계약완료(축하 코너·실적 포함)도 함께 취소됩니다.")) return;
    setBusy(true);
    if (claim.done_by) {
      const { error } = await sb.from("roulette_slots").update({ done_by: null, done_at: null, done_by_user: null }).eq("idx", claim.idx);
      if (error) { setBusy(false); setErr(error.message); return; }
    }
    const l = leaseOf(claim);
    if (l && l.contract_done) {
      const { error: e2 } = await sb.rpc("set_contract_done", { p_lease: claim.lease_id, p_done: false });
      if (e2) { setBusy(false); setErr("칸은 원복됐지만 원본 매물 계약완료 취소에 실패: " + e2.message); await onChanged(); return; }
    }
    setBusy(false);
    setClaim(null);
    await onChanged();
  };

  // 취소 가능: 관리인/관리자, 이벤트에서 본인이 처리한 칸(done_by_user), 원본에서 본인이 완료한 매물(이름 일치)
  const canUndo = !!(claim && claim._eff && (isMgr ||
    (claim._eff.viaSlot && claim.done_by_user && claim.done_by_user === me.user_id) ||
    (!claim._eff.viaSlot && claim._eff.by === (me.full_name || me.email))));

  return (
    <div className="bg-white rounded-2xl border-2 border-amber-300 p-4">
      <div className="flex items-start justify-between gap-2">
        <div className="min-w-0">
          <h3 className="font-bold text-slate-800 text-lg break-keep">🎡 꽝 없는 룰렛 이벤트</h3>
          <p className="text-xs text-slate-500 mt-0.5">
            {ROULETTE_START.split("-").join(".")} ~ {ROULETTE_END.split("-").join(".")} · 모든 매물 계약 시 조기 종료
          </p>
        </div>
        {notStarted ? (
          <span className="text-xs bg-amber-100 text-amber-700 border border-amber-200 rounded-full px-2.5 py-1 font-bold shrink-0">곧 시작!</span>
        ) : allDone && !expired ? (
          <span className="text-xs bg-emerald-100 text-emerald-700 border border-emerald-200 rounded-full px-2.5 py-1 font-bold shrink-0">🎉 전 매물 계약! 조기 종료</span>
        ) : expired ? (
          <span className="text-xs bg-slate-100 text-slate-500 border border-slate-200 rounded-full px-2.5 py-1 font-bold shrink-0">종료</span>
        ) : (
          <span className="text-xs bg-rose-100 text-rose-600 border border-rose-200 rounded-full px-2.5 py-1 font-bold shrink-0 animate-pulse">진행중</span>
        )}
      </div>
      <p className="text-xs text-slate-500 mt-2">
        🏆 <b className="text-amber-600">150만원 ×1</b> · 50만원 ×2 · 30만원 ×3 · 10만원 ×6 — 꽝 없음! · 계약완료 <b>{doneCount}</b> / {slots.length}
      </p>

      <div className="grid grid-cols-4 gap-1.5 sm:gap-2 mt-3">
        {slots.map((s) => {
          const eff = effOf(s);
          return eff ? (
          <button key={s.idx} onClick={() => openSlot(s)}
            className="rounded-xl border-2 border-emerald-300 bg-emerald-50 px-1 py-2 text-center min-h-[68px] flex flex-col items-center justify-center">
            <span className="text-base leading-none">🎉</span>
            <span className="text-xs sm:text-sm font-bold text-emerald-700 break-keep leading-tight mt-0.5">{eff.by}</span>
            <span className="text-[9px] sm:text-[10px] text-emerald-500 line-through leading-tight mt-0.5">{s.building} {s.room}</span>
          </button>
        ) : (
          <button key={s.idx} onClick={() => openSlot(s)} disabled={!active}
            className={"rounded-xl border px-1 py-2 text-center min-h-[68px] flex flex-col items-center justify-center transition " +
              (active ? "border-amber-200 bg-amber-50 hover:bg-amber-100 active:scale-95" : "border-slate-200 bg-slate-50 opacity-60")}>
            <span className="text-xs sm:text-sm font-bold text-slate-700 break-keep leading-tight">{s.building}</span>
            <span className="text-[11px] sm:text-xs text-slate-500 leading-tight mt-0.5">{s.room}</span>
          </button>
        );})}
      </div>

      <RoulettePractice />

      {claim && (
        <Modal title={claim._eff ? "계약완료 정보" : "🎡 계약완료 처리"} onClose={() => setClaim(null)}>
          <p className="text-center text-lg font-bold text-slate-800 mb-2">{claim.building} {claim.room}</p>
          {claim._eff ? (
            <div className="text-center">
              <p className="text-sm text-slate-600">🎉 <b>{claim._eff.by}</b> 님이 계약했어요!</p>
              {claim._eff.at && <p className="text-xs text-slate-400 mt-1">{String(claim._eff.at).slice(0, 10)}</p>}
              {err && <p className="text-sm text-red-600 mt-2">{err}</p>}
              <div className="flex gap-2 pt-4 pb-2">
                {canUndo && <button className={btnDanger + " flex-1"} onClick={undoClaim} disabled={busy}>{busy ? "처리 중..." : "계약완료 취소 (원본 포함)"}</button>}
                <button className={btnGhost + " flex-1"} onClick={() => setClaim(null)}>닫기</button>
              </div>
              {canUndo && <p className="text-[11px] text-slate-400 pb-1 break-keep">계약이 파기되었나요? 취소하면 이 칸이 다시 열리고, 원본 매물의 계약완료·축하 코너·실적도 함께 원복됩니다.</p>}
              {!canUndo && <p className="text-[11px] text-slate-400 pb-1 break-keep">취소(파기 원복)는 본인 또는 관리인만 할 수 있어요.</p>}
            </div>
          ) : (
            <div>
              <Field label="계약한 사람 이름 *">
                <input className={inputCls} value={name} onChange={(e) => setName(e.target.value)} placeholder="이름" />
              </Field>
              <p className="text-xs text-slate-400 mb-2 break-keep">
                계약완료 처리하면 이 칸이 위 이름으로 바뀌고, <b className="text-slate-500">원본 매물도 계약완료 처리되어 축하 코너에 올라갑니다.</b>
                {claim.lease_id ? " (실적 기록은 " + (me.full_name || "처리자") + " 이름으로 남습니다)" : ""}
              </p>
              {err && <p className="text-sm text-red-600 mb-2">{err}</p>}
              <div className="flex gap-2 pb-2">
                <button className={btnPrimary + " flex-1 py-3"} onClick={doClaim} disabled={busy}>{busy ? "처리 중..." : "🎉 계약완료"}</button>
                <button className={btnGhost} onClick={() => setClaim(null)}>취소</button>
              </div>
            </div>
          )}
        </Modal>
      )}
    </div>
  );
}

function ArchiveEditModal({ table, row, maxSeq, onClose, onSaved }) {
  const spec = ARCHIVE_SPECS[table];
  const isNew = !row.id;
  const [f, setF] = useState(() => {
    const o = {};
    spec.fields.forEach((fd) => { o[fd.k] = fd.type === "bool" ? row[fd.k] !== false : (row[fd.k] ?? ""); });
    return o;
  });
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const set = (k) => (e) => { const v = e.target.type === "checkbox" ? e.target.checked : e.target.value; setF((p) => ({ ...p, [k]: v })); };

  const save = async () => {
    const missing = spec.fields.find((fd) => fd.req && !String(f[fd.k] ?? "").trim());
    if (missing) { setErr(missing.label + " 항목을 입력하세요."); return; }
    setBusy(true); setErr("");
    const payload = {};
    spec.fields.forEach((fd) => {
      if (fd.type === "bool") payload[fd.k] = !!f[fd.k];
      else { const v = String(f[fd.k] ?? "").trim(); payload[fd.k] = v === "" ? null : v; }
    });
    let error;
    if (isNew) { payload.seq = (maxSeq || 0) + 1; ({ error } = await sb.from(spec.tableName).insert(payload)); }
    else ({ error } = await sb.from(spec.tableName).update(payload).eq("id", row.id));
    setBusy(false);
    if (error) { setErr("저장 실패: " + error.message); return; }
    onSaved();
  };

  const remove = async () => {
    if (!confirm("이 기록을 삭제할까요? 되돌릴 수 없습니다.")) return;
    setBusy(true); setErr("");
    const { error } = await sb.from(spec.tableName).delete().eq("id", row.id);
    setBusy(false);
    if (error) { setErr("삭제 실패: " + error.message); return; }
    onSaved();
  };

  return (
    <Modal title={spec.title + (isNew ? " 추가" : " 수정")} onClose={onClose}>
      <div className="grid grid-cols-2 gap-x-3">
        {spec.fields.map((fd) => fd.type === "bool" ? (
          <label key={fd.k} className="flex items-center gap-2 mb-3 col-span-2 text-sm font-medium text-slate-600 cursor-pointer">
            <input type="checkbox" className="w-4 h-4" checked={!!f[fd.k]} onChange={set(fd.k)} /> {fd.label}
          </label>
        ) : (
          <div key={fd.k} className={fd.full ? "col-span-2" : ""}>
            <Field label={fd.label + (fd.req ? " *" : "")}>
              {fd.type === "textarea"
                ? <textarea className={inputCls + " min-h-[90px]"} value={f[fd.k]} onChange={set(fd.k)} />
                : <input className={inputCls} value={f[fd.k]} onChange={set(fd.k)} />}
            </Field>
          </div>
        ))}
      </div>
      {err && <p className="text-sm text-red-600 mb-2">{err}</p>}
      <div className="flex gap-2 pt-1 pb-2">
        <button className={btnPrimary + " flex-1 py-3"} onClick={save} disabled={busy}>{busy ? "저장 중..." : "저장"}</button>
        {!isNew && <button className={btnDanger} onClick={remove} disabled={busy}>삭제</button>}
        <button className={btnGhost} onClick={onClose}>취소</button>
      </div>
    </Modal>
  );
}
