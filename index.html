/* ---------------- 유틸 ---------------- */
function dday(end) {
  if (!end) return null;
  const t = new Date(); t.setHours(0, 0, 0, 0);
  const e = new Date(end + "T00:00:00");
  if (isNaN(e)) return null;
  return Math.round((e - t) / 86400000);
}
function ddayInfo(end) {
  const d = dday(end);
  if (d === null) return { label: "-", cls: "bg-slate-200 text-slate-600" };
  if (d < 0) return { label: "만료 " + Math.abs(d) + "일", cls: "bg-red-600 text-white" };
  if (d === 0) return { label: "D-DAY", cls: "bg-red-600 text-white" };
  if (d <= 30) return { label: "D-" + d, cls: "bg-red-100 text-red-700 border border-red-300" };
  if (d <= 90) return { label: "D-" + d, cls: "bg-amber-100 text-amber-700 border border-amber-300" };
  return { label: "D-" + d, cls: "bg-emerald-100 text-emerald-700 border border-emerald-300" };
}
function fmtMoney(v) {
  if (v === null || v === undefined || v === "") return "-";
  const n = Number(v);
  if (isNaN(n)) return String(v);
  if (n >= 10000) {
    const eok = Math.floor(n / 10000), man = n % 10000;
    return man ? `${eok}억 ${man.toLocaleString()}` : `${eok}억`;
  }
  return n.toLocaleString();
}
function fmtDate(d) { return d || "-"; }
function normDate(v) {
  if (v === null || v === undefined || v === "") return null;
  if (v instanceof Date && !isNaN(v)) {
    const y = v.getFullYear(), m = String(v.getMonth() + 1).padStart(2, "0"), dd = String(v.getDate()).padStart(2, "0");
    return `${y}-${m}-${dd}`;
  }
  if (typeof v === "number") { // 엑셀 시리얼 날짜
    const d = new Date(Math.round((v - 25569) * 86400000));
    return normDate(d);
  }
  const s = String(v).trim().replace(/[./]/g, "-").replace(/-+$/, "");
  const m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if (m) return `${m[1]}-${m[2].padStart(2, "0")}-${m[3].padStart(2, "0")}`;
  return null;
}
function numOrNull(v) {
  if (v === null || v === undefined || v === "") return null;
  const n = Number(String(v).replace(/[,\s원만]/g, ""));
  return isNaN(n) ? null : n;
}
function leaseSort(a, b) {
  if (!a.end_date && !b.end_date) return 0;
  if (!a.end_date) return 1;
  if (!b.end_date) return -1;
  return a.end_date < b.end_date ? -1 : a.end_date > b.end_date ? 1 : 0;
}

/* 중복 검출
   - 완전 중복: 건물+호수+임차인+입주일+만기일이 모두 동일 → 재업로드 등으로 생긴 사본
   - 의심 중복: 건물+호수+보증금+월세가 동일하지만 나머지가 다름 → 사람이 확인 필요
   ※ 같은 호수라도 보증금/월세 금액이 다르면(전세·월세 병행 등) 중복으로 잡지 않음 */
function exactKey(l) {
  return [l.building_id, (l.room_number || "").trim(), (l.tenant_name || "").trim(), l.start_date || "", l.end_date || ""].join("|");
}
function findDupGroups(leases) {
  const exact = {}, amount = {};
  leases.forEach((l) => {
    const ek = exactKey(l);
    (exact[ek] = exact[ek] || []).push(l);
    const sk = [l.building_id, (l.room_number || "").trim(), l.deposit ?? "", l.rent ?? ""].join("|");
    (amount[sk] = amount[sk] || []).push(l);
  });
  const exactGroups = Object.values(exact).filter((g) => g.length > 1);
  const suspectGroups = Object.values(amount).filter((g) => {
    if (g.length < 2) return false;
    return new Set(g.map(exactKey)).size > 1; // 전부 동일하면 완전 중복 쪽에서 처리
  });
  return { exactGroups, suspectGroups };
}

function RegisterScreen({ session, onDone }) {
  const [name, setName] = useState(session.user.user_metadata?.full_name || "");
  const [phone, setPhone] = useState("");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const submit = async () => {
    if (!name.trim() || !phone.trim()) { setErr("이름과 연락처를 모두 입력해주세요."); return; }
    setBusy(true); setErr("");
    const { error } = await sb.from("user_roles").upsert({
      user_id: session.user.id, email: session.user.email, full_name: name.trim(), phone: phone.trim(), role: "viewer", status: "pending",
    }, { onConflict: "email" });
    setBusy(false);
    if (error) setErr("등록 실패: " + error.message); else onDone();
  };
  return (
    <div className="min-h-screen flex items-center justify-center p-6">
      <div className="bg-white rounded-2xl shadow-lg p-8 w-full max-w-sm">
        <h1 className="text-xl font-bold text-slate-800 mb-1">사용자 등록</h1>

}

/* ---------------- 임대 모달 (편집자/관리자) ---------------- */
function LeaseModal({ lease, buildings, customFields, onClose, onSaved }) {
  const isNew = !lease.id;
  const [f, setF] = useState({
    building_id: lease.building_id || (buildings[0] && buildings[0].id) || "",
    room_number: lease.room_number || "",
    tenant_name: lease.tenant_name || "",
    phone: lease.tenant_phone || "",
    start_date: lease.start_date || "",
    end_date: lease.end_date || "",
    deposit: lease.deposit ?? "",
    rent: lease.rent ?? "",
    maintenance_fee: lease.management_fee ?? "",
    insurance: lease.insurance || "",
    memo: lease.memo || "",
    extra: lease.custom_data || {},
  });
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const set = (k, v) => setF((p) => ({ ...p, [k]: v }));
  const setExtra = (k, v) => setF((p) => ({ ...p, extra: { ...p.extra, [k]: v } }));

  const save = async () => {
    if (!f.building_id || !f.room_number.trim()) { setErr("건물과 호수는 필수입니다."); return; }
    setBusy(true); setErr("");
    const payload = {
      building_id: f.building_id,
      room_number: f.room_number.trim(),
      tenant_name: f.tenant_name.trim() || null,
      tenant_phone: f.phone.trim() || null,
      start_date: f.start_date || null,
      end_date: f.end_date || null,
      deposit: numOrNull(f.deposit),
      rent: numOrNull(f.rent),
      management_fee: numOrNull(f.maintenance_fee),
      insurance: f.insurance.trim() || null,
      memo: f.memo.trim() || null,
      custom_data: f.extra,
    };
    const q = isNew ? sb.from("leases").insert(payload) : sb.from("leases").update(payload).eq("id", lease.id);
    const { error } = await q;
    setBusy(false);
    if (error) setErr("저장 실패: " + error.message); else { onSaved(); onClose(); }
  };
  const remove = async () => {
    if (!confirm("이 임대 정보를 삭제할까요?")) return;
    setBusy(true);
    const { error } = await sb.from("leases").delete().eq("id", lease.id);
    setBusy(false);
    if (error) setErr("삭제 실패: " + error.message); else { onSaved(); onClose(); }
  };

  return (
    <Modal title={isNew ? "임대 정보 추가" : "임대 정보 수정"} onClose={onClose} wide>
      <div className="grid grid-cols-1 sm:grid-cols-2 gap-x-4">
        <Field label="건물 *">
          <select className={inputCls} value={f.building_id} onChange={(e) => set("building_id", e.target.value)}>
            {buildings.map((b) => <option key={b.id} value={b.id}>{b.name}</option>)}
          </select>
        </Field>
        <Field label="호수 *"><input className={inputCls} value={f.room_number} onChange={(e) => set("room_number", e.target.value)} placeholder="101호" /></Field>
        <Field label="임차인명"><input className={inputCls} value={f.tenant_name} onChange={(e) => set("tenant_name", e.target.value)} /></Field>
        <Field label="연락처"><input className={inputCls} value={f.phone} onChange={(e) => set("phone", e.target.value)} inputMode="tel" /></Field>
        <Field label="입주날짜"><input type="date" className={inputCls} value={f.start_date} onChange={(e) => set("start_date", e.target.value)} /></Field>
        <Field label="만기일"><input type="date" className={inputCls} value={f.end_date} onChange={(e) => set("end_date", e.target.value)} /></Field>
        <Field label="보증금 (만원)"><input className={inputCls} value={f.deposit} onChange={(e) => set("deposit", e.target.value)} inputMode="numeric" /></Field>
        <Field label="월세 (만원)"><input className={inputCls} value={f.rent} onChange={(e) => set("rent", e.target.value)} inputMode="numeric" /></Field>
        <Field label="관리비 (만원)"><input className={inputCls} value={f.maintenance_fee} onChange={(e) => set("maintenance_fee", e.target.value)} inputMode="numeric" /></Field>
        <Field label="보증보험"><input className={inputCls} value={f.insurance} onChange={(e) => set("insurance", e.target.value)} placeholder="가입 / 미가입" list="insurance-opts" /></Field>
        <datalist id="insurance-opts"><option value="가입" /><option value="미가입" /></datalist>
      </div>
      <Field label="메모"><textarea className={inputCls} rows="3" value={f.memo} onChange={(e) => set("memo", e.target.value)} /></Field>
      {customFields.length > 0 && (
        <div className="border-t pt-3 mt-1">
          <p className="text-sm font-semibold text-slate-500 mb-2">추가 정보</p>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-x-4">
            {customFields.map((cf) => (
              <Field key={cf.id} label={cf.field_label}>
                <input className={inputCls} value={f.extra[cf.field_key] || ""} onChange={(e) => setExtra(cf.field_key, e.target.value)} />
              </Field>
            ))}
          </div>
        </div>
      )}
      {err && <p className="text-sm text-red-600 mb-3">{err}</p>}
      <div className="flex gap-2 pt-2 pb-2">
        <button className={btnPrimary + " flex-1 py-3"} onClick={save} disabled={busy}>{busy ? "저장 중..." : "저장"}</button>
        {!isNew && <button className={btnDanger} onClick={remove} disabled={busy}>삭제</button>}
        <button className={btnGhost} onClick={onClose}>취소</button>
      </div>
    </Modal>
  );
}

/* ---------------- 건물 추가/수정 모달 ---------------- */
function BuildingModal({ building, onClose, onSaved }) {
  const isNew = !building.id;
  const [name, setName] = useState(building.name || "");
  const [address, setAddress] = useState(building.address || "");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const save = async () => {
    if (!name.trim()) { setErr("건물명을 입력하세요."); return; }
    setBusy(true); setErr("");
    const payload = { name: name.trim(), address: address.trim() || null };
    const q = isNew ? sb.from("buildings").insert(payload) : sb.from("buildings").update(payload).eq("id", building.id);
    const { error } = await q;
    setBusy(false);
    if (error) setErr("저장 실패: " + error.message); else { onSaved(); onClose(); }
  };
  const remove = async () => {
    if (!confirm("건물을 삭제하면 소속된 모든 임대 정보도 함께 삭제됩니다. 계속할까요?")) return;
    setBusy(true);
    const { error } = await sb.from("buildings").delete().eq("id", building.id);
    setBusy(false);
    if (error) setErr("삭제 실패: " + error.message); else { onSaved(); onClose(); }
  };
  return (
    <Modal title={isNew ? "건물 추가" : "건물 수정"} onClose={onClose}>
      <Field label="건물명"><input className={inputCls} value={name} onChange={(e) => setName(e.target.value)} placeholder="예: 보담빌딩" /></Field>
      <Field label="주소"><input className={inputCls} value={address} onChange={(e) => setAddress(e.target.value)} placeholder="예: 서울 마포구 ..." /></Field>
      {err && <p className="text-sm text-red-600 mb-3">{err}</p>}
      <div className="flex gap-2 pb-2">
        <button className={btnPrimary + " flex-1"} onClick={save} disabled={busy}>저장</button>
        {!isNew && <button className={btnDanger} onClick={remove} disabled={busy}>삭제</button>}
        <button className={btnGhost} onClick={onClose}>취소</button>
      </div>
    </Modal>
  );
}

/* ---------------- 관리자 패널 ---------------- */
function AdminPanel({ profile, buildings, customFields, onClose, onDataChanged }) {
  const [tab, setTab] = useState("users");
  const [users, setUsers] = useState([]);
  const [newField, setNewField] = useState("");
  const [msg, setMsg] = useState("");
  const [importResult, setImportResult] = useState(null);
  const [importing, setImporting] = useState(false);
  const fileRef = useRef(null);

  const loadUsers = async () => {
    const { data } = await sb.from("user_roles").select("*").order("created_at");
    setUsers(data || []);
  };
  useEffect(() => { loadUsers(); }, []);

  const setRole = async (u, role) => {
    if (u.id === profile.id && role !== "admin" && !confirm("본인의 관리자 권한을 해제하면 이 패널에 접근할 수 없습니다. 계속할까요?")) return;
    await sb.from("user_roles").update({ role }).eq("id", u.id);
    loadUsers();
  };
  const approve = async (u, role) => {
    await sb.from("user_roles").update({ status: "active", role }).eq("id", u.id);
    loadUsers();
  };
  const removeUser = async (u) => {
    if (!confirm(`${u.full_name || u.email} 사용자를 삭제할까요?`)) return;
    await sb.from("user_roles").delete().eq("id", u.id);
    loadUsers();
  };
  const addField = async () => {
    if (!newField.trim()) return;
    const { error } = await sb.from("custom_fields").insert({
      field_key: "cf_" + Date.now().toString(36),
      field_label: newField.trim(),
      field_type: "text",
      sort_order: customFields.length,
    });
    if (error) setMsg("추가 실패: " + error.message);
    else { setNewField(""); setMsg(""); onDataChanged(); }
  };
  const removeField = async (cf) => {
    if (!confirm(`"${cf.field_label}" 필드를 삭제할까요? (기존 입력값은 데이터에 남지만 화면에 표시되지 않습니다)`)) return;
    await sb.from("custom_fields").delete().eq("id", cf.id);
    onDataChanged();
  };

  /* 엑셀 업로드 */
  const handleFile = async (file) => {
    if (!file) return;
    setImporting(true); setImportResult(null);
    try {
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, { cellDates: true });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { defval: "" });
      if (rows.length === 0) throw new Error("데이터 행이 없습니다.");
      const keyOf = (row, kw) => Object.keys(row).find((k) => k.replace(/\s/g, "").includes(kw));
      const k = {
        id: keyOf(rows[0], "ID"),
        building: keyOf(rows[0], "건물명"), room: keyOf(rows[0], "호수"),
        tenant: keyOf(rows[0], "임차인"), phone: keyOf(rows[0], "연락처"),
        start: keyOf(rows[0], "입주"), end: keyOf(rows[0], "만기"),
        deposit: keyOf(rows[0], "보증금"), rent: keyOf(rows[0], "월세"),
        fee: keyOf(rows[0], "관리비"), insurance: keyOf(rows[0], "보증보험"),
        memo: keyOf(rows[0], "메모"),
      };
      if (!k.building || !k.room) throw new Error("필수 열(건물명, 호수)을 찾을 수 없습니다. 열 제목을 확인하세요.");

      // 1) 건물 확보 (기존 조회 + 없는 것 생성)
      const { data: existingB } = await sb.from("buildings").select("id,name");
      const bMap = {}; (existingB || []).forEach((b) => (bMap[b.name] = b.id));
      const newNames = [...new Set(rows.map((r) => String(r[k.building]).trim()).filter((n) => n && !bMap[n]))];
      if (newNames.length > 0) {
        const { data: inserted, error } = await sb.from("buildings").insert(newNames.map((name) => ({ name }))).select();
        if (error) throw error;
        (inserted || []).forEach((b) => (bMap[b.name] = b.id));
      }

      // 2) 기존 임대 조회: ID 매칭(수정용) + 중복 방지 키
      const { data: existingL } = await sb.from("leases").select("id,building_id,room_number,tenant_name,start_date,end_date");
      const existingIds = new Set((existingL || []).map((l) => l.id));
      const dupKey = (l) => [l.building_id, l.room_number, l.tenant_name || "", l.start_date || "", l.end_date || ""].join("|");
      const seen = new Set((existingL || []).map(dupKey));

      // 3) 행 변환: ID가 있으면 기존 데이터 수정, 없으면 신규 등록
      let skipped = 0, invalid = 0, updated = 0;
      const inserts = [], updates = [];
      for (const r of rows) {
        const bname = String(r[k.building]).trim();
        const room = String(r[k.room]).trim();
        if (!bname || !room) { invalid++; continue; }
        const p = {
          building_id: bMap[bname],
          room_number: room,
          tenant_name: k.tenant ? String(r[k.tenant]).trim() || null : null,
          tenant_phone: k.phone ? String(r[k.phone]).trim() || null : null,
          start_date: k.start ? normDate(r[k.start]) : null,
          end_date: k.end ? normDate(r[k.end]) : null,
          deposit: k.deposit ? numOrNull(r[k.deposit]) : null,
          rent: k.rent ? numOrNull(r[k.rent]) : null,
          management_fee: k.fee ? numOrNull(r[k.fee]) : null,
          insurance: k.insurance ? String(r[k.insurance]).trim() || null : null,
          memo: k.memo ? String(r[k.memo]).trim() || null : null,
        };
        const rowId = k.id ? String(r[k.id]).trim() : "";
        if (rowId && existingIds.has(rowId)) {
          updates.push({ id: rowId, payload: p });
          continue;
        }
        p.custom_data = {};
        const key = dupKey(p);
        if (seen.has(key)) { skipped++; continue; }
        seen.add(key);
        inserts.push(p);
      }

      // 4) 수정 반영 (ID 매칭 행)
      for (const u of updates) {
        const { error } = await sb.from("leases").update(u.payload).eq("id", u.id);
        if (error) throw error;
        updated++;
      }
      // 5) 신규 100건씩 삽입
      for (let i = 0; i < inserts.length; i += 100) {
        const { error } = await sb.from("leases").insert(inserts.slice(i, i + 100));
        if (error) throw error;
      }
      setImportResult({ ok: true, added: inserts.length, updated, skipped, invalid, total: rows.length });
      onDataChanged();
    } catch (e) {
      setImportResult({ ok: false, message: e.message });
    } finally {
      setImporting(false);
      if (fileRef.current) fileRef.current.value = "";
    }
  };

  const pendingUsers = users.filter((u) => u.status === "pending");
  const tabBtn = (id, label, badge) => (
    <button onClick={() => setTab(id)}
      className={"px-3.5 py-2 rounded-lg text-sm font-semibold whitespace-nowrap " + (tab === id ? "bg-blue-600 text-white" : "bg-slate-100 text-slate-600 hover:bg-slate-200")}>
      {label}{badge > 0 && <span className="ml-1.5 bg-red-500 text-white text-xs rounded-full px-1.5">{badge}</span>}
    </button>
  );

  return (
    <Modal title="관리자 패널" onClose={onClose} wide>
      <div className="flex gap-2 mb-4 overflow-x-auto scrollbar-thin pb-1">
        {tabBtn("users", "사용자 관리", pendingUsers.length)}
        {tabBtn("fields", "커스텀 필드")}
        {tabBtn("excel", "엑셀 업로드")}
      </div>

      {tab === "users" && (
        <div className="space-y-2 pb-2">
          {users.length === 0 && <p className="text-sm text-slate-400 text-center py-6">사용자가 없습니다.</p>}
          {users.map((u) => (
            <div key={u.id} className={"border rounded-xl p-3 " + (u.status === "pending" ? "border-amber-300 bg-amber-50" : "bg-white")}>
              <div className="flex flex-wrap items-center gap-x-2 gap-y-1">
                <span className="font-semibold text-slate-800">{u.full_name || "(이름 없음)"}</span>
                <RoleBadge role={u.status === "pending" ? "pending" : u.role} />
                {u.id === profile.id && <span className="text-xs text-slate-400">(나)</span>}
              </div>
              <p className="text-sm text-slate-500 mt-0.5">{u.email}{u.phone ? " · " + u.phone : ""}</p>
              <div className="flex flex-wrap gap-2 mt-2">
                {u.status === "pending" ? (
                  <React.Fragment>
                    <button className={btnPrimary + " !py-1.5"} onClick={() => approve(u, "viewer")}>열람자로 승인</button>
                    <button className={btnGhost + " !py-1.5"} onClick={() => approve(u, "editor")}>편집자로 승인</button>
                    <button className={btnDanger + " !py-1.5"} onClick={() => removeUser(u)}>거절</button>
                  </React.Fragment>
                ) : (
                  <React.Fragment>
                    <select className="border border-slate-300 rounded-lg px-2 py-1.5 text-sm bg-white" value={u.role} onChange={(e) => setRole(u, e.target.value)}>
                      <option value="viewer">열람자</option>
                      <option value="editor">편집자</option>
                      <option value="admin">관리자</option>
                    </select>
                    <button className={btnDanger + " !py-1.5"} onClick={() => removeUser(u)}>삭제</button>
                  </React.Fragment>
                )}
              </div>
            </div>
          ))}
        </div>
      )}

      {tab === "fields" && (
        <div className="pb-2">
          <p className="text-sm text-slate-500 mb-3">임대 정보에 추가로 기록할 항목을 정의합니다. (예: 주차, 특약사항)</p>
          <div className="flex gap-2 mb-4">
            <input className={inputCls} value={newField} onChange={(e) => setNewField(e.target.value)} placeholder="새 필드 이름" onKeyDown={(e) => e.key === "Enter" && addField()} />
            <button className={btnPrimary + " shrink-0"} onClick={addField}>추가</button>
          </div>
          {msg && <p className="text-sm text-red-600 mb-2">{msg}</p>}
          <div className="space-y-2">
            {customFields.length === 0 && <p className="text-sm text-slate-400 text-center py-4">등록된 커스텀 필드가 없습니다.</p>}
            {customFields.map((cf) => (
              <div key={cf.id} className="flex items-center justify-between border rounded-xl px-3 py-2.5 bg-white">
                <span className="font-medium text-slate-700">{cf.field_label}</span>
                <button className="text-sm text-red-500 hover:text-red-700" onClick={() => removeField(cf)}>삭제</button>
              </div>
            ))}
          </div>
        </div>
      )}

      {tab === "excel" && (
        <div className="pb-2">
          <div className="bg-slate-50 border rounded-xl p-3 mb-4 text-sm text-slate-600 leading-relaxed">
            <p className="font-semibold text-slate-700 mb-1">엑셀 양식 (첫 행 = 열 제목)</p>
            <p className="break-keep">건물명(주소) · 호수 · 임차인명 · 연락처 · 입주날짜 · 만기일 · 보증금(만원) · 월세(만원) · 관리비(만원) · 보증보험 · 메모</p>
            <p className="mt-2 text-slate-400 break-keep">※ "엑셀 다운로드"로 받은 파일에는 ID 열이 있습니다. ID가 있는 행은 <b>기존 데이터 수정</b>으로 반영되고(중복 안 생김), ID가 없는 행은 신규 등록됩니다. ID 열은 수정하지 마세요.</p>
            <p className="mt-1 text-slate-400">※ 이미 등록된 것과 동일한 행(건물·호수·임차인·입주·만기 일치)은 자동으로 건너뜁니다.</p>
          </div>
          <input ref={fileRef} type="file" accept=".xlsx,.xls" className="hidden" onChange={(e) => handleFile(e.target.files[0])} />
          <button className={btnPrimary + " w-full py-3"} disabled={importing} onClick={() => fileRef.current.click()}>
            {importing ? "가져오는 중..." : "엑셀 파일 선택"}
          </button>
          {importResult && (
            importResult.ok ? (
              <div className="mt-3 bg-emerald-50 border border-emerald-200 rounded-xl p-3 text-sm text-emerald-800">
                총 {importResult.total}행 중 <b>{importResult.added}건 추가</b>
                {importResult.updated > 0 && <span>, <b>{importResult.updated}건 수정</b></span>}
                {importResult.skipped > 0 && <span>, 중복 {importResult.skipped}건 건너뜀</span>}
                {importResult.invalid > 0 && <span>, 필수값 누락 {importResult.invalid}건 제외</span>}
              </div>
            ) : (
              <div className="mt-3 bg-red-50 border border-red-200 rounded-xl p-3 text-sm text-red-700">오류: {importResult.message}</div>
            )
          )}
        </div>
      )}
    </Modal>
  );
}

/* ---------------- 메인 앱 ---------------- */
function MainApp({ session, profile, onProfileChanged }) {
  const [buildings, setBuildings] = useState([]);
  const [leases, setLeases] = useState([]);
  const [customFields, setCustomFields] = useState([]);
  const [loading, setLoading] = useState(true);
  const [view, setView] = useState({ name: "home" }); // home | building | all
  const [search, setSearch] = useState("");
  const [modal, setModal] = useState(null); // {type:'lease'|'building'|'admin'|'profile', ...}
  const [menuOpen, setMenuOpen] = useState(false);

  const canEdit = profile.role === "editor" || profile.role === "admin";
  const isAdmin = profile.role === "admin";

  const fetchAll = async () => {
    const [b, l, f] = await Promise.all([
      sb.from("buildings").select("*"),
      sb.from("leases").select("*"),
      sb.from("custom_fields").select("*").order("sort_order"),
    ]);
    setBuildings((b.data || []).sort((x, y) => x.name.localeCompare(y.name, "ko")));
    setLeases((l.data || []).sort(leaseSort));
    setCustomFields(f.data || []);
    setLoading(false);
  };
  useEffect(() => { fetchAll(); }, []);

  const leasesByBuilding = useMemo(() => {
    const m = {};
    leases.forEach((l) => { (m[l.building_id] = m[l.building_id] || []).push(l); });
    return m;
  }, [leases]);

  const q = search.trim().toLowerCase();
  const filteredBuildings = useMemo(() => {
    if (!q) return buildings;
    return buildings.filter((b) => {
      if (b.name.toLowerCase().includes(q)) return true;
      return (leasesByBuilding[b.id] || []).some((l) =>
        (l.room_number || "").toLowerCase().includes(q) ||
        (canEdit && (l.tenant_name || "").toLowerCase().includes(q))
      );
    });
  }, [q, buildings, leasesByBuilding, canEdit]);

  const urgentCount = useMemo(() => leases.filter((l) => { const d = dday(l.end_date); return d !== null && d <= 30; }).length, [leases]);
  const dupCount = useMemo(() => {
    const { exactGroups, suspectGroups } = findDupGroups(leases);
    return exactGroups.length + suspectGroups.length;
  }, [leases]);

  const openLease = (l) => canEdit && setModal({ type: "lease", lease: l });

  const exportExcel = () => {
    const rows = leases.map((l) => {
      const b = buildings.find((x) => x.id === l.building_id) || {};
      return {
        "ID(수정금지)": l.id,
        "건물명(주소)": b.name || "",
        "호수": l.room_number || "",
        "임차인명": l.tenant_name || "",
        "연락처": l.tenant_phone || "",
        "입주날짜": l.start_date || "",
        "만기일": l.end_date || "",
        "보증금(만원)": l.deposit ?? "",
        "월세(만원)": l.rent ?? "",
        "관리비(만원)": l.management_fee ?? "",
        "보증보험": l.insurance || "",
        "메모": l.memo || "",
      };
    });
    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "임대현황");
    const d = new Date(), pad = (n) => String(n).padStart(2, "0");
    XLSX.writeFile(wb, `보담임대현황_${d.getFullYear()}${pad(d.getMonth() + 1)}${pad(d.getDate())}.xlsx`);
  };

  if (loading) return <div className="min-h-screen flex items-center justify-center text-slate-400">불러오는 중...</div>;

  const currentBuilding = view.name === "building" ? buildings.find((b) => b.id === view.buildingId) : null;

  return (
    <div className="min-h-screen pb-10">
      {/* 헤더 */}
      <header className="bg-white border-b sticky top-0 z-40">
        <div className="max-w-6xl mx-auto px-3 sm:px-6 py-2.5 flex items-center gap-2">
          <button className="flex items-center gap-2 font-bold text-slate-800 text-lg shrink-0" onClick={() => { setView({ name: "home" }); setSearch(""); }}>
            <span>🏢</span><span className="hidden xs:inline sm:inline">보담 임대관리</span>
          </button>
          <div className="flex-1" />
          {canEdit && (
            <button className={"text-sm font-semibold px-3 py-1.5 rounded-lg " + (view.name === "all" ? "bg-blue-600 text-white" : "text-blue-600 hover:bg-blue-50")}
              onClick={() => setView({ name: "all" })}>전체보기</button>
          )}
          {isAdmin && (
            <button className="text-sm font-semibold text-slate-600 hover:bg-slate-100 px-3 py-1.5 rounded-lg" onClick={() => setModal({ type: "admin" })}>관리자</button>
          )}
          <div className="relative">
            <button className="w-9 h-9 rounded-full bg-blue-100 text-blue-700 font-bold text-sm flex items-center justify-center" onClick={() => setMenuOpen((v) => !v)}>
              {(profile.full_name || "?").slice(0, 1)}
            </button>
            {menuOpen && (
              <div className="absolute right-0 top-11 bg-white border rounded-xl shadow-lg w-48 py-1 z-50" onMouseLeave={() => setMenuOpen(false)}>
                <div className="px-4 py-2 border-b">
                  <p className="font-semibold text-slate-800 text-sm truncate">{profile.full_name}</p>
                  <RoleBadge role={profile.role} />
                </div>
                <button className="w-full text-left px-4 py-2.5 text-sm hover:bg-slate-50" onClick={() => { setMenuOpen(false); setModal({ type: "profile" }); }}>내 프로필</button>
                <button className="w-full text-left px-4 py-2.5 text-sm text-red-600 hover:bg-red-50" onClick={() => sb.auth.signOut()}>로그아웃</button>
              </div>
            )}
          </div>
        </div>
      </header>

      <main className="max-w-6xl mx-auto px-3 sm:px-6 pt-4">
        {/* 홈 */}
        {view.name === "home" && (
          <div>
            <div className="flex flex-col sm:flex-row sm:items-center gap-2 mb-4">
              <input className={inputCls + " sm:max-w-xs"} placeholder={canEdit ? "건물명 · 호수 · 임차인 검색" : "건물명 · 호수 검색"}
                value={search} onChange={(e) => setSearch(e.target.value)} />
              <div className="flex items-center gap-2 text-sm text-slate-500">
                <span>건물 {buildings.length}개 · 임대 {leases.length}건</span>
                {urgentCount > 0 && <span className="bg-red-100 text-red-700 font-semibold px-2 py-0.5 rounded-full text-xs">30일 내 만기 {urgentCount}건</span>}
              </div>
              <div className="flex-1" />
              {canEdit && (
                <div className="flex gap-2 flex-wrap">
                  <button className={btnGhost + (dupCount > 0 ? " !border-amber-400 !text-amber-700" : "")} onClick={() => setModal({ type: "dups" })}>
                    중복 검사{dupCount > 0 && <span className="ml-1.5 bg-amber-500 text-white text-xs rounded-full px-1.5 py-0.5">{dupCount}</span>}
                  </button>
                  <button className={btnGhost} onClick={exportExcel} disabled={leases.length === 0}>엑셀 다운로드</button>
                  <button className={btnGhost} onClick={() => setModal({ type: "building", building: {} })}>+ 건물</button>
                  <button className={btnPrimary} onClick={() => setModal({ type: "lease", lease: {} })} disabled={buildings.length === 0}>+ 임대 등록</button>
                </div>
              )}
            </div>

            {filteredBuildings.length === 0 && (
              <p className="text-center text-slate-400 py-16">{buildings.length === 0 ? "등록된 건물이 없습니다. 엑셀 업로드 또는 + 건물 버튼으로 시작하세요." : "검색 결과가 없습니다."}</p>
            )}
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
              {filteredBuildings.map((b) => {
                const bl = (leasesByBuilding[b.id] || []);
                const top3 = bl.slice(0, 3);
                return (
                  <div key={b.id} className="bg-white rounded-2xl border shadow-sm p-4 cursor-pointer hover:shadow-md active:bg-slate-50 transition"
                       onClick={() => setView({ name: "building", buildingId: b.id })}>
                    <div className="flex items-start justify-between mb-2">
                      <div>
                        <h3 className="font-bold text-slate-800 break-keep leading-snug">{b.name}</h3>
                        {b.address && <p className="text-xs text-slate-400 break-keep">{b.address}</p>}
                      </div>
                      <span className="text-xs text-slate-400 shrink-0 ml-2 mt-0.5">{bl.length}건</span>
                    </div>
                    {top3.length === 0 && <p className="text-sm text-slate-400">임대 정보 없음</p>}
                    <div className="space-y-1.5">
                      {top3.map((l) => {
                        const d = ddayInfo(l.end_date);
                        return (
                          <div key={l.id} className="flex items-center justify-between text-sm">
                            <span className="text-slate-600 truncate">
                              <b className="text-slate-800">{l.room_number}</b>
                              {canEdit && l.tenant_name && <span className="ml-1.5">{l.tenant_name}</span>}
                              <span className="ml-1.5 text-slate-400">{fmtDate(l.end_date)}</span>
                            </span>
                            <span className={"text-xs font-bold px-2 py-0.5 rounded-full shrink-0 ml-2 " + d.cls}>{d.label}</span>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* 건물 상세 */}
        {view.name === "building" && currentBuilding && (
          <div>
            <div className="flex items-center gap-2 mb-4 flex-wrap">
              <button className="text-slate-400 hover:text-slate-700 text-xl px-1" onClick={() => setView({ name: "home" })}>←</button>
              <h2 className="font-bold text-xl text-slate-800 break-keep">{currentBuilding.name}</h2>
              {currentBuilding.address && <span className="text-sm text-slate-400 break-keep">{currentBuilding.address}</span>}
              <span className="text-sm text-slate-400">{(leasesByBuilding[currentBuilding.id] || []).length}건</span>
              <div className="flex-1" />
              {canEdit && (
                <div className="flex gap-2">
                  {isAdmin && <button className={btnGhost} onClick={() => setModal({ type: "building", building: currentBuilding })}>건물 수정</button>}
                  <button className={btnPrimary} onClick={() => setModal({ type: "lease", lease: { building_id: currentBuilding.id } })}>+ 임대 등록</button>
                </div>
              )}
            </div>
            <LeaseList leases={leasesByBuilding[currentBuilding.id] || []} buildings={buildings} canEdit={canEdit} showBuilding={false} onRowClick={openLease} />
          </div>
        )}

        {/* 전체보기 */}
        {view.name === "all" && canEdit && (
          <div>
            <div className="flex items-center gap-2 mb-4 flex-wrap">
              <button className="text-slate-400 hover:text-slate-700 text-xl px-1" onClick={() => setView({ name: "home" })}>←</button>
              <h2 className="font-bold text-xl text-slate-800">전체 임대 목록</h2>
              <span className="text-sm text-slate-400">만기일 순 · {leases.length}건</span>
              <div className="flex-1" />
              <input className={inputCls + " sm:max-w-xs"} placeholder="검색" value={search} onChange={(e) => setSearch(e.target.value)} />
            </div>
            <LeaseList
              leases={leases.filter((l) => {
                if (!q) return true;
                const b = buildings.find((x) => x.id === l.building_id);
                return (b && b.name.toLowerCase().includes(q)) ||
                  (l.room_number || "").toLowerCase().includes(q) ||
                  (l.tenant_name || "").toLowerCase().includes(q);
              })}
              buildings={buildings} canEdit={canEdit} showBuilding={true} onRowClick={openLease} />
          </div>
        )}
      </main>

      {/* 모달들 */}
      {modal && modal.type === "lease" && (
        <LeaseModal lease={modal.lease} buildings={buildings} customFields={customFields} onClose={() => setModal(null)} onSaved={fetchAll} />
      )}
      {modal && modal.type === "building" && (
        <BuildingModal building={modal.building} onClose={() => { setModal(null); if (modal.building.id) setView({ name: "home" }); }} onSaved={fetchAll} />
      )}
      {modal && modal.type === "dups" && canEdit && (
        <DuplicateModal leases={leases} buildings={buildings} onClose={() => setModal(null)} onSaved={fetchAll} />
      )}
      {modal && modal.type === "admin" && isAdmin && (
        <AdminPanel profile={profile} buildings={buildings} customFields={customFields} onClose={() => setModal(null)} onDataChanged={fetchAll} />
      )}
      {modal && modal.type === "profile" && (
        <ProfileModal profile={profile} onClose={() => setModal(null)} onSaved={onProfileChanged} />
      )}
    </div>
  );
}

/* ---------------- 루트 ---------------- */
function App() {
  const [session, setSession] = useState(undefined); // undefined=확인중, null=미로그인
  const [profile, setProfile] = useState(undefined);

  useEffect(() => {
    if (!sb) return;
    sb.auth.getSession().then(({ data }) => setSession(data.session));
    const { data: sub } = sb.auth.onAuthStateChange((_e, s) => setSession(s));
    return () => sub.subscription.unsubscribe();
  }, []);

  const loadProfile = async (uid) => {
    let { data } = await sb.from("user_roles").select("*").eq("user_id", uid).maybeSingle();
    if (!data && session) {
      // 예전에 이메일로만 등록된 행 연결
      const { data: byEmail } = await sb.from("user_roles").select("*").eq("email", session.user.email).maybeSingle();
      if (byEmail) {
        await sb.from("user_roles").update({ user_id: uid }).eq("id", byEmail.id);
        data = { ...byEmail, user_id: uid };
      }
    }
    setProfile(data || null);
  };
  useEffect(() => {
    if (session) loadProfile(session.user.id); else setProfile(undefined);
  }, [session && session.user.id]);

  if (!IS_CONFIGURED) return <SetupScreen />;
  if (session === undefined) return <div className="min-h-screen flex items-center justify-center text-slate-400">확인 중...</div>;
  if (!session) return <LoginScreen />;
  if (profile === undefined) return <div className="min-h-screen flex items-center justify-center text-slate-400">프로필 확인 중...</div>;
  if (profile === null) return <RegisterScreen session={session} onDone={() => loadProfile(session.user.id)} />;
  if (profile.status !== "active") return <PendingScreen profile={profile} />;
  return <MainApp session={session} profile={profile} onProfileChanged={() => loadProfile(session.user.id)} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
